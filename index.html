// ===== CRUD =====
function addFootprint(name, address, lnglat, type, visitDate = null, unlockedPercent = null) {
  const fp = addFootprintWithReturn(name, address, lnglat, type, visitDate, unlockedPercent);
  if (fp) {
    const toastMsgs = {
      visited: `✅ 已标记「${name}」为已去过`,
      upcoming: `已将「${name}」标记为CGC项目`,
      project: `已将「${name}」标记为近期项目`
    };
    showToast(toastMsgs[type], type === 'visited' ? 'success' : type);
  }
}

function addFootprintWithReturn(name, address, lnglat, type, visitDate = null, unlockedPercent = null) {
  const fp = {
    id: Date.now() + Math.random().toString(36).slice(2),
    name, address, type,
    lng: lnglat[0], lat: lnglat[1],
    time: visitDate || new Date().toLocaleString('zh-CN'),
    unlocked: unlockedPercent
  };
  footprints.push(fp);
  save();
  renderFootprints();
  updateStats();
  addMarker(fp);
  return fp;
}

// ===== 加载用户足迹数据 =====
function loadUserFootprints() {
  // 检查是否已经加载过
  if (localStorage.getItem('user_footprints_loaded')) return;
  
  USER_FOOTPRINTS.forEach(city => {
    const coords = CITY_COORDS[city.name];
    if (coords) {
      addFootprint(
        city.name,
        `${city.name}市`,
        coords,
        'visited',
        `${city.date} 点亮`,
        city.unlocked
      );
    }
  });
  
  localStorage.setItem('user_footprints_loaded', 'true');
  showToast(`✅ 已加载 ${USER_FOOTPRINTS.length} 个城市的足迹`, 'success');
}

function removeFootprint(id) {
  const fp = footprints.find(f => f.id === id);
  footprints = footprints.filter(f => f.id !== id);
  save();
  renderFootprints();
  updateStats();
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (fp) showToast(`🗑️ 已删除「${fp.name}」`, 'error');
  
  Object.keys(itinerary).forEach(dateKey => {
    itinerary[dateKey] = itinerary[dateKey].filter(p => p.locationId !== id);
    if (itinerary[dateKey].length === 0) delete itinerary[dateKey];
  });
  localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
  triggerAutoSync();
  updateItineraryStats();
  drawRouteLine();
}

function convertFootprint(id, targetType) {
  const fp = footprints.find(f => f.id === id);
  if (!fp) return;
  fp.type = targetType;
  fp.time = new Date().toLocaleString('zh-CN');
  save();
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  addMarker(fp);
  renderFootprints();
  updateStats();
  
  const toastMsgs = {
    visited: `🎉「${fp.name}」已标记为去过！`,
    upcoming: `「${fp.name}」已标记为CGC项目`,
    project: `「${fp.name}」已标记为近期项目`
  };
  showToast(toastMsgs[fp.type], fp.type === 'visited' ? 'success' : fp.type);
}

function clearAll(type) {
  const items = footprints.filter(f => f.type === type);
  if (items.length === 0) return;
  const labels = { visited: '已去过', upcoming: 'CGC项目', project: '近期项目' };
  if (!confirm(`确定要清空所有「${labels[type]}」的地点吗？`)) return;
  items.forEach(fp => { if (markers[fp.id]) { map.removeLayer(markers[fp.id]); delete markers[fp.id]; } });
  footprints = footprints.filter(f => f.type !== type);
  save();
  renderFootprints();
  updateStats();
  showToast(`🗑️ 已清空所有「${labels[type]}」`, 'error');
}

function cleanTestData() {
  const testPatterns = [
    /^[a-z]\d{2,4}$/i,
    /^test\d*$/i,
    /^\d{3,}$/,
    /^.{1,2}$/
  ];

  const toRemove = footprints.filter(fp => {
    return testPatterns.some(pattern => pattern.test(fp.name.trim()));
  });

  if (toRemove.length === 0) {
    showToast('✅ 没有发现测试数据', 'success');
    return;
  }

  if (!confirm(`发现 ${toRemove.length} 条可能是测试数据的记录，确定清理吗？`)) return;

  toRemove.forEach(fp => {
    if (markers[fp.id]) {
      map.removeLayer(markers[fp.id]);
      delete markers[fp.id];
    }
  });

  const removedCount = toRemove.length;
  footprints = footprints.filter(f => !toRemove.includes(f));
  save();
  renderFootprints();
  updateStats();
  showToast(`🧹 已清理 ${removedCount} 条测试数据`, 'success');
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(footprints));
  triggerAutoSync();
}

// ===== Markers =====
function addMarker(fp) {
  const markerContent = document.createElement('div');
  markerContent.className = 'custom-marker';
  
  // 判断是否是草稿状态（新添加未编辑的）
  const isDraft = fp.name === '新地点' || fp.name === '地点';
  
  // 截短名字，超过6个字显示省略号
  const displayName = fp.name.length > 6 ? fp.name.slice(0, 5) + '...' : fp.name;
  
  // 提取日期：从 time 字段中提取日期部分（去掉时间和"点亮"等后缀）
  const dateStr = fp.time ? fp.time.split(' ')[0].replace(/\s*点亮\s*$/, '').replace(/\//g, '.') : '';
  
  // 草稿状态显示小点但有动画效果（点和动画上下居中）
  if (isDraft) {
    if (fp.type === 'upcoming') {
      markerContent.innerHTML = `
        <div class="marker-dot upcoming-dot" style="width:10px;height:10px;margin:5px 0;"></div>
        <div class="marker-ring upcoming-ring" style="width:20px;height:20px;top:0;border-width:1px;"></div>
        <div class="marker-ring2 upcoming-ring2" style="width:20px;height:20px;top:0;border-width:1px;"></div>
      `;
    } else if (fp.type === 'project') {
      markerContent.innerHTML = `
        <div class="marker-dot project-dot" style="width:10px;height:10px;margin:5px 0;"></div>
        <div class="marker-ring project-ring" style="width:20px;height:20px;top:0;border-width:1px;"></div>
        <div class="marker-ring2 project-ring2" style="width:20px;height:20px;top:0;border-width:1px;"></div>
      `;
    } else {
      markerContent.innerHTML = `
        <div class="marker-dot visited-dot" style="width:10px;height:10px;margin:5px 0;"></div>
        <div class="marker-ring visited-ring" style="width:20px;height:20px;top:0;border-width:1px;"></div>
        <div class="marker-ring2 visited-ring2" style="width:20px;height:20px;top:0;border-width:1px;"></div>
      `;
    }
  } else if (fp.type === 'upcoming') {
    const personInline = fp.person ? `<span class="label-person">${fp.person}</span>` : '';
    const dateHtml = fp.time ? `<div class="marker-date upcoming-date">${fp.time.split(' ')[0].replace(/\s*点亮\s*$/, '')}</div>` : '';
    markerContent.innerHTML = `
      <div class="marker-dot upcoming-dot"></div>
      <div class="marker-ring upcoming-ring"></div>
      <div class="marker-ring2 upcoming-ring2"></div>
      <div class="marker-label upcoming-label"><span class="label-city">${displayName}</span>${personInline}</div>
      ${dateHtml}
    `;
  } else if (fp.type === 'project') {
    const personInline = fp.person ? `<span class="label-person">${fp.person}</span>` : '';
    const dateHtml = fp.time ? `<div class="marker-date project-date">${fp.time.split(' ')[0].replace(/\s*点亮\s*$/, '')}</div>` : '';
    markerContent.innerHTML = `
      <div class="marker-dot project-dot"></div>
      <div class="marker-ring project-ring"></div>
      <div class="marker-ring2 project-ring2"></div>
      <div class="marker-label project-label"><span class="label-city">${displayName}</span>${personInline}</div>
      ${dateHtml}
    `;
  } else {
    markerContent.innerHTML = `
      <div class="marker-dot visited-dot"></div>
      <div class="marker-ring visited-ring"></div>
      <div class="marker-ring2 visited-ring2"></div>
      <div class="marker-label visited-label">${displayName}</div>
    `;
  }

  // 草稿标记和正常标记使用不同的尺寸和锚点
  const showExtra = (fp.type === 'project' || fp.type === 'upcoming') && (fp.person || fp.time);
  const icon = isDraft ? L.divIcon({
    html: markerContent,
    className: 'custom-div-icon',
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  }) : L.divIcon({
    html: markerContent,
    className: 'custom-div-icon',
    iconSize: showExtra ? [140, 52] : [120, 40],
    iconAnchor: showExtra ? [70, 20] : [60, 20]
  });

  const marker = L.marker([fp.lat, fp.lng], { icon });
  if (!window.hiddenTypes.has(fp.type)) {
    marker.addTo(map);
  }

  const popupClasses = { visited: 'visited-popup', upcoming: 'upcoming-popup', project: 'project-popup' };
  const badgeClasses = { visited: 'visited', upcoming: 'upcoming', project: 'project' };
  const badgeTexts = { visited: '✓ 已去过', upcoming: 'CGC项目', project: '近期项目' };

  const otherTypes = ['visited', 'upcoming', 'project'].filter(t => t !== fp.type);
  const convertButtons = otherTypes.map(t => {
    const btnTexts = { visited: '✓ 改为去过', upcoming: '改为CGC项目', project: '改为近期项目' };
    return `<button class="popup-btn convert" onclick="convertFootprint('${fp.id}', '${t}'); map.closePopup();">${btnTexts[t]}</button>`;
  }).join('');
  
  const unlockedHTML = fp.unlocked !== null && fp.unlocked !== undefined
    ? `<div style="margin-top:8px;color:#00d4ff;font-size:12px;">🔓 ${fp.unlocked}% 已解锁</div>`
    : '';
  
  const personHTML = fp.person
    ? `<div style="margin-top:6px;color:var(--text-secondary);font-size:12px;">👤 负责人：${fp.person}</div>`
    : '';
  
  const popupContent = `
    <div class="custom-popup ${popupClasses[fp.type]}">
      <div class="popup-header">
        <h3 class="popup-title ${fp.type}">${fp.name}</h3>
        <span class="popup-badge ${badgeClasses[fp.type]}">${badgeTexts[fp.type]}</span>
      </div>
      <div class="popup-addr">${fp.address}</div>
      <div class="popup-time">📅 ${fp.time}</div>
      ${personHTML}
      ${unlockedHTML}
      <div class="popup-actions">
        ${convertButtons}
        <button class="popup-btn" onclick="openEditFootprintModal('${fp.id}'); map.closePopup();">✎ 编辑</button>
        <button class="popup-btn danger" onclick="removeFootprint('${fp.id}'); map.closePopup();">删除</button>
      </div>
    </div>
  `;

  marker.bindPopup(popupContent, {
    closeButton: true,
    className: 'custom-popup-wrapper',
    offset: [0, -5]
  });

  marker.on('popupopen', () => { activePopup = marker; });
  marker.on('popupclose', () => { activePopup = null; });
  
  // 双击标记打开编辑框
  marker.on('dblclick', (e) => {
    L.DomEvent.stopPropagation(e);
    L.DomEvent.preventDefault(e);
    openEditFootprintModal(fp.id);
  });

  markers[fp.id] = marker;
}

    scheduleItems = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
    saveScheduleItems();
  }
}

function saveScheduleItems() {
  localStorage.setItem(SCHEDULE_KEY, JSON.stringify(scheduleItems));
  triggerAutoSync();
}

// ===== Project Schedule =====
let editingScheduleIdx = -1;

function renderProjectSchedule() {
  loadScheduleItems();
  const tbody = document.getElementById('scheduleTableBody');
  const monthLabel = document.getElementById('scheduleMonthLabel');

  // Show current month
  const now = new Date();
  monthLabel.textContent = now.getFullYear() + '年' + (now.getMonth()+1) + '月';

  // Filter current month items (use UTC to avoid timezone issues)
  const monthItems = scheduleItems.filter(item => {
    if (!item.date) return false;
    const [y, m] = item.date.split('-').map(Number);
    return y === now.getFullYear() && (m - 1) === now.getMonth();
  });

  // 获取或创建卡片容器
  let cardsContainer = document.getElementById('scheduleCardsContainer');
  if (!cardsContainer) {
    cardsContainer = document.createElement('div');
    cardsContainer.id = 'scheduleCardsContainer';
    cardsContainer.className = 'schedule-cards';
    // 插入到 schedule-wrapper 内、schedule-table 之后
    const wrapper = document.querySelector('.schedule-wrapper');
    if (wrapper) {
      const table = wrapper.querySelector('.schedule-table');
      if (table) table.parentNode.insertBefore(cardsContainer, table.nextSibling);
      else wrapper.appendChild(cardsContainer);
    }
  }

  if (monthItems.length === 0) {
    tbody.innerHTML = '<tr class="schedule-empty-row"><td colspan="5">暂无项目安排<br>点击「添加」或「刷新日历」</td></tr>';
    cardsContainer.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-secondary);font-size:14px;">暂无项目安排<br>点击「添加」或「刷新日历」</div>';
    return;
  }

  // Sort by date
  monthItems.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  // 桌面端表格渲染
  tbody.innerHTML = monthItems.map((item, idx) => {
    const d1 = new Date(item.date);
    const d2 = new Date(item.endDate || item.date);
    let dateDisplay;
    if (item.date === (item.endDate || '') || !item.endDate) {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日';
    } else if (d1.getMonth() === d2.getMonth()) {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日-' + d2.getDate() + '日';
    } else {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日-' + (d2.getMonth()+1) + '月' + d2.getDate() + '日';
    }
    const realIdx = scheduleItems.indexOf(item);
    return '<tr>' +
      '<td class="td-seq">' + (idx + 1) + '</td>' +
      '<td class="td-content" onclick="editScheduleItem(' + realIdx + ')">' + (item.content || '') + '</td>' +
      '<td class="td-person">' + (item.person || '-') + '</td>' +
      '<td class="td-time">' + dateDisplay + '</td>' +
      '<td class="td-action">' +
        '<button class="edit-btn" onclick="editScheduleItem(' + realIdx + ')" title="编辑">✎</button>' +
        '<button class="del-btn" onclick="deleteScheduleItem(' + realIdx + ')" title="删除">✕</button>' +
      '</td></tr>';
  }).join('');

  // 手机端卡片渲染
  cardsContainer.innerHTML = monthItems.map((item, idx) => {
    const d1 = new Date(item.date);
    const d2 = new Date(item.endDate || item.date);
    let dateDisplay;
    if (item.date === (item.endDate || '') || !item.endDate) {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日';
    } else if (d1.getMonth() === d2.getMonth()) {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日-' + d2.getDate() + '日';
    } else {
      dateDisplay = (d1.getMonth()+1) + '月' + d1.getDate() + '日-' + (d2.getMonth()+1) + '月' + d2.getDate() + '日';
    }
    const realIdx = scheduleItems.indexOf(item);
    const personHtml = item.person
      ? '<span class="schedule-card-person">' + item.person + '</span>'
      : '';
    return '<div class="schedule-card">' +
      '<div class="schedule-card-main">' +
        '<div class="schedule-card-content">' + (idx+1) + '. ' + (item.content || '') + '</div>' +
        personHtml +
      '</div>' +
      '<div class="schedule-card-time">📅 ' + dateDisplay + '</div>' +
      '<div class="schedule-card-actions">' +
        '<button class="schedule-card-btn" onclick="editScheduleItem(' + realIdx + ')">✎ 编辑</button>' +
        '<button class="schedule-card-btn delete" onclick="deleteScheduleItem(' + realIdx + ')">✕ 删除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function refreshScheduleFromCalendar() {
  loadScheduleItems();
  let added = 0;
  const existingSet = new Set(scheduleItems.map(s => s.content + s.date));

  Object.entries(CALENDAR_EVENTS || {}).forEach(([dateKey, events]) => {
    events.forEach(ev => {
      if (existingSet.has(ev.title + dateKey)) return;
      const { city, person } = extractPersonFromTitle(ev.title || '');
      const content = city ? city + (person ? ' (' + person + ')' : '') : ev.title;
      scheduleItems.push({ content, person: person || '', date: dateKey, id: Date.now() + added });
      existingSet.add(ev.title + dateKey);
      added++;
    });
  });

  if (added > 0) {
    saveScheduleItems();
    renderProjectSchedule();
    showToast('🔄 已从日历同步 ' + added + ' 条项目', 'success');
  } else {
    showToast('✅ 日历数据已是最新', 'info');
  }
}

function renderFootprints() {
  const list = document.getElementById('footprintList');
  list.innerHTML = '';

  const isDraft = f => f.name === '新地点' || f.name === '地点';

  const visited = footprints.filter(f => f.type === 'visited' && !isDraft(f));
  const upcoming = footprints.filter(f => f.type === 'upcoming' && !isDraft(f));
  const projects = footprints.filter(f => f.type === 'project' && !isDraft(f));
  const wishlist = footprints.filter(f => f.type === 'wishlist' && !isDraft(f));

  if (visited.length === 0 && upcoming.length === 0 && projects.length === 0 && wishlist.length === 0) {
    list.innerHTML = '<div style="padding:30px;text-align:center;color:rgba(255,255,255,0.2);font-size:13px;">还没有足迹<br>搜索地点或点击地图开始记录 ✨</div>';
    return;
  }

  if (!window.sectionCollapsed) {
    window.sectionCollapsed = { project: true, upcoming: true, visited: true, wishlist: true };
  }

  if (projects.length > 0) {
    renderSection(list, 'project', '🔴 近期项目', projects, 'project-title');
  }

  if (upcoming.length > 0) {
    renderSection(list, 'upcoming', '🟡 CGC项目', upcoming, 'upcoming-title');
  }

  if (wishlist.length > 0) {
    renderSection(list, 'wishlist', '🌟 想去', wishlist, 'wishlist-title');
  }

  if (visited.length > 0) {
    renderSection(list, 'visited', '📍 已去过', visited, 'visited-title');
  }
}

function renderSection(list, type, titleText, items, titleClass) {
  const isHidden = window.hiddenTypes?.has(type);
  const title = document.createElement('div');
  title.className = `list-section-title ${titleClass} ${window.sectionCollapsed?.[type] ? 'collapsed' : ''}`;
  title.innerHTML = `${titleText} <span class="section-count">${items.length}</span><button class="visibility-toggle ${isHidden ? 'hidden' : ''}" title="${isHidden ? '显示地图标注' : '隐藏地图标注'}" onclick="event.stopPropagation(); toggleTypeVisibility('${type}');">${isHidden ? '🙈' : '👁️'}</button><span class="collapse-icon">▼</span>`;
  list.appendChild(title);

  const section = document.createElement('div');
  section.className = `footprint-list-section ${window.sectionCollapsed?.[type] ? 'collapsed' : ''}`;
  section.dataset.type = type;

  const displayItems = [...items].reverse();
  const maxDisplay = 5;
  const visibleItems = displayItems.slice(0, maxDisplay);
  const hiddenCount = displayItems.length - maxDisplay;

  visibleItems.forEach((fp, idx) => {
    section.appendChild(createFootprintCard(fp, displayItems.length - idx));
  });

  if (hiddenCount > 0) {
    const expandBtn = document.createElement('div');
    expandBtn.className = 'expand-more-btn';
    expandBtn.innerHTML = `展开 ${hiddenCount} 个更多 ▼`;
    expandBtn.addEventListener('click', () => {
      expandBtn.remove();
      displayItems.slice(maxDisplay).forEach((fp, idx) => {
        section.appendChild(createFootprintCard(fp, displayItems.length - idx - maxDisplay));
      });
    });
    section.appendChild(expandBtn);
  }

  list.appendChild(section);

  title.addEventListener('click', () => {
    const isCollapsed = section.classList.toggle('collapsed');
    title.classList.toggle('collapsed', isCollapsed);
    if (!window.sectionCollapsed) window.sectionCollapsed = {};
    window.sectionCollapsed[type] = isCollapsed;
  });
}

function createFootprintCard(fp, num) {
  const card = document.createElement('div');
  card.className = 'footprint-card ' + (fp.type === 'project' ? 'project-card' : fp.type === 'upcoming' ? 'upcoming-card' : 'visited-card');

  const badgeHTMLs = {
    visited: '<span class="fp-badge visited-badge">✓ 去过</span>',
    upcoming: '<span class="fp-badge upcoming-badge">CGC项目</span>',
    project: '<span class="fp-badge project-badge">近期项目</span>'
  };

  const otherTypes = ['visited', 'upcoming', 'project'].filter(t => t !== fp.type);
  const convertButtons = otherTypes.map(t => {
    const icons = { visited: '✓', upcoming: '●', project: '●' };
    const labels = { visited: '去过', upcoming: 'CGC项目', project: '近期项目' };
    return `<button class="fp-action-btn convert-btn" title="改为${labels[t]}" data-target="${t}">${icons[t]}</button>`;
  }).join('');
  
  const editButton = `<button class="fp-action-btn edit-btn" title="编辑">✎</button>`;
  
  // 显示解锁百分比
  const unlockedHTML = fp.unlocked !== null && fp.unlocked !== undefined 
    ? `<div class="fp-unlocked ${fp.type}-unlocked">🔓 ${fp.unlocked}% 已解锁</div>` 
    : '';
  
  card.innerHTML = `
    <div class="fp-header">
      <span class="fp-index ${fp.type}-idx">#${String(num).padStart(2,'0')}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        ${badgeHTMLs[fp.type]}
        <div class="fp-actions">
          ${editButton}
          ${convertButtons}
          <button class="fp-action-btn" title="删除">✕</button>
        </div>
      </div>
    </div>
    <div class="fp-name">${fp.name}</div>
    <div class="fp-addr">${fp.address}</div>
    <div class="fp-time ${fp.type}-time">📅 ${fp.time}</div>
    ${unlockedHTML}
  `;
  
  card.addEventListener('click', (e) => {
    if (e.target.closest('.fp-action-btn')) return;
    map.setView([fp.lat, fp.lng], 14);
    if (markers[fp.id]) markers[fp.id].openPopup();
  });
  
  card.querySelectorAll('.convert-btn').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); convertFootprint(fp.id, btn.dataset.target); });
  });
  
  card.querySelectorAll('.fp-action-btn').forEach(btn => {
    if (btn.classList.contains('edit-btn')) {
      btn.addEventListener('click', (e) => { e.stopPropagation(); openEditFootprintModal(fp.id); });
    } else if (!btn.classList.contains('convert-btn')) {
      btn.addEventListener('click', (e) => { e.stopPropagation(); removeFootprint(fp.id); });
    }
  });
  
  return card;
}

const VISIBILITY_KEY = 'travel_type_visibility';
window.hiddenTypes = new Set(JSON.parse(localStorage.getItem(VISIBILITY_KEY) || '[]'));

function toggleTypeVisibility(type) {
  if (window.hiddenTypes.has(type)) {
    window.hiddenTypes.delete(type);
    // 显示该类型的所有标记
    footprints.filter(f => f.type === type).forEach(fp => {
      if (markers[fp.id] && !map.hasLayer(markers[fp.id])) {
        markers[fp.id].addTo(map);
      }
    });
  } else {
    window.hiddenTypes.add(type);
    // 隐藏该类型的所有标记
    footprints.filter(f => f.type === type).forEach(fp => {
      if (markers[fp.id] && map.hasLayer(markers[fp.id])) {
        map.removeLayer(markers[fp.id]);
      }
    });
  }
  localStorage.setItem(VISIBILITY_KEY, JSON.stringify([...window.hiddenTypes]));
  renderFootprints(); // 刷新面板中的眼睛图标状态
}

// 初始化时隐藏已保存的隐藏类型标记
function applyHiddenTypes() {
  window.hiddenTypes.forEach(type => {

      if (markers[fp.id] && map.hasLayer(markers[fp.id])) {

}

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const data = JSON.parse(event.target.result);
      if (data.footprints) {
        footprints = data.footprints;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(footprints));

      if (data.itinerary) {
        itinerary = data.itinerary;

    } catch (err) {

// ===== GitHub Gist Sync =====
async function uploadToGist() {
  const token = document.getElementById('githubToken').value.trim();
  let gistId = document.getElementById('gistId').value.trim();

  if (!token) {
    showToast('❌ 请输入 GitHub Token', 'error');
    return;
  }

  localStorage.setItem('github_token', token);

  const data = {
    footprints: footprints,
    itinerary: itinerary,
    syncTime: new Date().toISOString(),
    version: '2.0'
  };

  try {
    let response;
    const headers = {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };
    const body = JSON.stringify({
      description: 'Travel Map Data - 旅行足迹数据备份',
      public: false,
      files: {
        'travel-map-data.json': {
          content: JSON.stringify(data, null, 2)
        }
      }
    });

    if (gistId) {
      response = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: headers,
        body: body
      });
    } else {
      response = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: headers,
        body: body
      });
    }

    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.message || '上传失败');
    }

    const result = await response.json();
    localStorage.setItem('gist_id', result.id);
    document.getElementById('gistId').value = result.id;

    showToast('✅ 上传成功！Gist ID: ' + result.id.slice(0, 8) + '...', 'success');
  } catch (err) {
    showToast('❌ 上传失败: ' + err.message, 'error');
    console.error('Upload error:', err);
  }
}

async function downloadFromGist() {
  const token = document.getElementById('githubToken').value.trim();
  const gistId = document.getElementById('gistId').value.trim();

  if (!gistId) {
    showToast('❌ 请输入 Gist ID', 'error');
    return;
  }

  if (token) {
    localStorage.setItem('github_token', token);
  }
  localStorage.setItem('gist_id', gistId);

  try {
    const headers = token ? { 'Authorization': `token ${token}` } : {};
    const response = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: headers
    });

    if (!response.ok) {
      throw new Error('下载失败！HTTP ' + response.status + ' - 请检查 Gist ID 是否正确');
    }

    const result = await response.json();
    const fileContent = result.files['travel-map-data.json']?.content;

    if (!fileContent) {
      const availableFiles = Object.keys(result.files || {}).join(', ');
      throw new Error('Gist中没有找到 travel-map-data.json 文件，现有文件: ' + (availableFiles || '无'));
    }

    const data = JSON.parse(fileContent);

    if (data.footprints) {
      footprints = data.footprints;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(footprints));
    }
    if (data.itinerary) {
      itinerary = data.itinerary;
      localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
    }

    localStorage.setItem('last_sync_time', data.syncTime || new Date().toISOString());

    renderAllMarkers();
    renderFootprints();
    updateStats();
    renderCalendar();
    renderDayDetail();
    updateItineraryStats();
    drawRouteLine();
    renderDestinations();

    showToast('✅ 下载成功！数据已同步', 'success');
  } catch (err) {
    showToast('❌ 下载失败: ' + err.message, 'error');
    console.error('Download error:', err);
  }
}

  if (!localStorage.getItem('github_token')) {
    localStorage.setItem('github_token', DEFAULT_TK);
  }
  if (!localStorage.getItem('gist_id')) {
    localStorage.setItem('gist_id', DEFAULT_GIST);
  }
  if (localStorage.getItem('auto_sync') === null) {
    localStorage.setItem('auto_sync', 'true');
  }
})();

// 静默上传（不弹 toast）
async function silentUploadToGist() {
  const token = localStorage.getItem('github_token');
  const gistId = localStorage.getItem('gist_id');
  if (!token || !gistId || !autoSyncEnabled) return;

  try {
    const data = {
      footprints: footprints,
      itinerary: itinerary,
      syncTime: new Date().toISOString(),
      version: '2.0'
    };

    await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        description: 'Travel Map Data - 旅行足迹数据备份',
        public: false,
        files: {
          'travel-map-data.json': {
            content: JSON.stringify(data, null, 2)
          }
        }
      })
    });
    console.log('☁️ 自动同步成功', new Date().toLocaleTimeString());
  } catch (err) {
    console.error('☁️ 自动同步失败:', err.message);
  }
}

// 静默下载（页面加载时）
async function silentDownloadFromGist() {
  const token = localStorage.getItem('github_token');
  const gistId = localStorage.getItem('gist_id');
  if (!token || !gistId || !autoSyncEnabled) return;

  try {
    const headers = token ? { 'Authorization': `token ${token}` } : {};
    const response = await fetch(`https://api.github.com/gists/${gistId}`, { headers: headers });

    if (!response.ok) return;

    const result = await response.json();
    const fileContent = result.files['travel-map-data.json']?.content;
    if (!fileContent) return;

    const data = JSON.parse(fileContent);
    const cloudTime = data.syncTime ? new Date(data.syncTime) : 0;
    const localTime = localStorage.getItem('last_sync_time') ? new Date(localStorage.getItem('last_sync_time')) : 0;

    // 只在云端数据比本地新时才下载
    if (cloudTime > localTime) {
      if (data.footprints) {
        footprints = data.footprints;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(footprints));
      }
      if (data.itinerary) {
        itinerary = data.itinerary;
        localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
      }
      renderAllMarkers();
      renderFootprints();
      updateStats();
      renderCalendar();
      renderDayDetail();
      updateItineraryStats();
      drawRouteLine();
      renderDestinations();
      showToast('☁️ 已自动同步云端数据', 'info');
    }
  } catch (err) {
    console.error('自动下载失败:', err.message);
  }
}

// 触发自动上传（防抖 3 秒）
function triggerAutoSync() {
  if (!autoSyncEnabled) return;
  autoSyncPending = true;
  if (autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(async () => {
    await silentUploadToGist();
    if (autoSyncPending) {
      localStorage.setItem('last_sync_time', new Date().toISOString());
      autoSyncPending = false;
    }
  }, 3000);
}

// 切换自动同步
function toggleAutoSync() {
  autoSyncEnabled = !autoSyncEnabled;
  localStorage.setItem('auto_sync', autoSyncEnabled);
  updateAutoSyncUI();
  if (autoSyncEnabled) {
    showToast('☁️ 自动同步已开启', 'success');
    triggerAutoSync();
  } else {
    showToast('☁️ 自动同步已关闭', 'info');
  }
}

function updateAutoSyncUI() {
  const btn = document.getElementById('autoSyncBtn');
  if (btn) {
    btn.textContent = autoSyncEnabled ? '自动同步: 开' : '自动同步: 关';
    btn.style.color = autoSyncEnabled ? '#00ff88' : 'rgba(255,255,255,0.5)';
  }
}

// Start
init();
updateAutoSyncUI();
setTimeout(silentDownloadFromGist, 2000);
</script>
