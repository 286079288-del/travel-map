<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超大人项目规划 🗺️</title>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  /* ===== Theme Variables ===== */
  :root, .dark-theme {
    --bg-primary: #080c24;
    --bg-panel: rgba(12,16,42,0.72);
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --bg-input: rgba(255,255,255,0.06);
    --border-color: rgba(255,255,255,0.1);
    --border-light: rgba(255,255,255,0.05);
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --text-faint: rgba(255,255,255,0.18);
    --accent: #00d4ff;
    --accent2: #7b61ff;
    --accent-bg: rgba(0,212,255,0.08);
    --accent2-bg: rgba(123,97,255,0.08);
    --danger: #ff4757;
    --danger-bg: rgba(255,71,87,0.12);
    --warning: #ffd700;
    --success: #2ed573;
    --shadow-color: rgba(0,0,0,0.55);
    --header-gradient: rgba(8,12,36,0.85);
    --header-gradient-end: rgba(8,12,36,0.5);
    --star-opacity: 0.3;
    --cal-bg: rgba(0,0,0,0.2);
    --cal-day-hover: rgba(255,255,255,0.06);
    --cal-today-bg: rgba(0,212,255,0.15);
    --scrollbar-thumb: rgba(255,255,255,0.12);
    --marker-shadow: rgba(0,0,0,0.3);
    --popup-bg: rgba(14,18,48,0.96);
    --schedule-header-bg: rgba(0,212,255,0.06);
    --schedule-stripe: rgba(0,212,255,0.8);
    --glow-accent: 0 0 30px rgba(0,212,255,0.15);
    --glow-accent2: 0 0 30px rgba(123,97,255,0.15);
  }
  .light-theme {
    --bg-primary: #f0f2f7;
    --bg-panel: rgba(255,255,255,0.82);
    --bg-card: rgba(0,0,0,0.04);
    --bg-card-hover: rgba(0,0,0,0.07);
    --bg-input: rgba(0,0,0,0.04);
    --border-color: rgba(0,0,0,0.08);
    --border-light: rgba(0,0,0,0.04);
    --text-primary: rgba(20,25,50,0.95);
    --text-secondary: rgba(20,25,50,0.6);
    --text-muted: rgba(20,25,50,0.35);
    --text-faint: rgba(20,25,50,0.18);
    --accent: #0891b2;
    --accent2: #7c3aed;
    --accent-bg: rgba(8,145,178,0.08);
    --accent2-bg: rgba(124,58,237,0.08);
    --danger: #e11d48;
    --danger-bg: rgba(225,29,72,0.1);
    --warning: #d97706;
    --success: #16a34a;
    --shadow-color: rgba(0,0,0,0.08);
    --header-gradient: rgba(255,255,255,0.88);
    --header-gradient-end: rgba(255,255,255,0.6);
    --star-opacity: 0;
    --cal-bg: rgba(0,0,0,0.03);
    --cal-day-hover: rgba(0,0,0,0.04);
    --cal-today-bg: rgba(8,145,178,0.1);
    --scrollbar-thumb: rgba(0,0,0,0.12);
    --marker-shadow: rgba(0,0,0,0.15);
    --popup-bg: rgba(255,255,255,0.96);
    --schedule-header-bg: rgba(8,145,178,0.06);
    --schedule-stripe: rgba(8,145,178,0.7);
    --glow-accent: 0 0 20px rgba(8,145,178,0.1);
    --glow-accent2: 0 0 20px rgba(124,58,237,0.1);
  }
  [data-theme="light"] {
    --bg-primary: #f0f2f7;
    --bg-panel: rgba(255,255,255,0.82);
    --bg-card: rgba(0,0,0,0.04);
    --bg-card-hover: rgba(0,0,0,0.07);
    --bg-input: rgba(0,0,0,0.04);
    --border-color: rgba(0,0,0,0.08);
    --border-light: rgba(0,0,0,0.04);
    --text-primary: rgba(20,25,50,0.95);
    --text-secondary: rgba(20,25,50,0.6);
    --text-muted: rgba(20,25,50,0.35);
    --text-faint: rgba(20,25,50,0.18);
    --accent: #0891b2;
    --accent2: #7c3aed;
    --accent-bg: rgba(8,145,178,0.08);
    --accent2-bg: rgba(124,58,237,0.08);
    --danger: #e11d48;
    --danger-bg: rgba(225,29,72,0.1);
    --warning: #d97706;
    --success: #16a34a;
    --shadow-color: rgba(0,0,0,0.08);
    --header-gradient: rgba(255,255,255,0.88);
    --header-gradient-end: rgba(255,255,255,0.6);
    --star-opacity: 0;
    --cal-bg: rgba(0,0,0,0.03);
    --cal-day-hover: rgba(0,0,0,0.04);
    --cal-today-bg: rgba(8,145,178,0.1);
    --scrollbar-thumb: rgba(0,0,0,0.12);
    --scrollbar-track: transparent;
    --popup-bg: rgba(255,255,255,0.96);
    --schedule-header-bg: rgba(8,145,178,0.06);
    --schedule-stripe: rgba(8,145,178,0.7);
    --marker-shadow: rgba(0,0,0,0.15);
    --glow-accent: 0 0 20px rgba(8,145,178,0.1);
    --glow-accent2: 0 0 20px rgba(124,58,237,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    height: 100vh;
    background: var(--bg-primary);
    transition: background 0.4s ease;
  }

  #mapContainer { width: 100%; height: 100vh; position: relative; z-index: 1; }

  /* ===== Stars ===== */
  .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.6; }
  .star {
    position: absolute; width: 2px; height: 2px; background: var(--text-primary); border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite; opacity: 0;
  }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:var(--op);transform:scale(1)} }

  /* ===== Header ===== */
  .header {
    position: fixed; top:0; left:0; right:0; z-index:100; padding:14px 28px;
    background: linear-gradient(to bottom, var(--header-gradient) 0%, var(--header-gradient-end) 70%, transparent 100%);
    backdrop-filter: blur(16px);
    display: flex; justify-content: space-between; align-items: center; pointer-events: none;
  }
  .header > * { pointer-events: auto; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--glow-accent);
    transition: transform 0.3s ease;
  }
  .logo-icon:hover { transform: scale(1.1) rotate(5deg); }
  .logo-text { font-size: 20px; font-weight: 300; letter-spacing: 2px; color: var(--text-primary); }
  .logo-text span {
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .stats { display: none; }
  .stat-value.upcoming {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stat-value.project {
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stat-label { font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; margin-top: 4px; }

  /* ===== Mode Switch ===== */
  .mode-switch {
    display: flex; background: var(--bg-panel); backdrop-filter: blur(20px);
    border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden;
  }
  .mode-btn {
    padding: 10px 18px; border: none; background: transparent; color: var(--text-secondary);
    font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
    transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;
    position: relative;
  }
  .mode-btn.active-visited {
    background: var(--accent-bg); color: #00d4ff;
    box-shadow: inset 0 -2px 0 #00d4ff;
  }

  .mode-btn.active-upcoming {
    background: rgba(255,215,0,0.15); color: #ffd700;
    box-shadow: inset 0 -2px 0 #ffd700;
  }
  .mode-btn.active-project {
    background: rgba(255,71,87,0.15); color: #ff4757;
    box-shadow: inset 0 -2px 0 #ff4757;
  }
  .mode-btn:hover:not(.active-visited):not(.active-upcoming):not(.active-project) { color: var(--text-primary); }

  /* ===== Map Type Switch ===== */
  .map-type-switch {
    position: fixed; bottom: 30px; right: 30px; z-index: 100;
    display: flex; background: var(--bg-panel); backdrop-filter: blur(24px);
    border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 24px var(--shadow-color);
  }
  .map-type-btn {
    padding: 8px 14px; border: none; background: transparent; color: var(--text-secondary);
    font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;
    transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;
  }
  .map-type-btn.active {
    background: var(--accent-bg); color: #00d4ff;
  }
  .map-type-btn:hover:not(.active) { color: var(--text-primary); }

  /* ===== Left Panel (Search + Itinerary) ===== */
  .left-panel {
    position: fixed; top: 76px; left: 16px; z-index: 100; width: 620px;
    height: calc(100vh - 92px);
    display: flex; flex-direction: column;
    background: var(--bg-panel); backdrop-filter: blur(24px);
    border: 1px solid var(--border-color); border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--glow-accent), 0 8px 40px var(--shadow-color);
    transition: box-shadow 0.3s ease;
  }

  /* Tabs */
  .panel-tabs {
    display: flex; border-bottom: 1px solid var(--border-color);
  }
  .panel-tab {
    flex: 1; padding: 13px; border: none; background: transparent;
    color: var(--text-secondary); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.3s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    position: relative;
  }
  .panel-tab.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .panel-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 1px;
  }
  .panel-tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-card); }

  /* Tab Content */
  .tab-content { display: none; padding: 16px; overflow-y: auto; }
  .tab-content.active { display: block; }

  /* Search Section */
  .search-section {
    border: 1px solid var(--border-color);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .search-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--accent-bg);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .search-section-header:hover {
    background: var(--accent-bg);
  }
  .search-section-title {
    font-size: 13px;
    font-weight: 600;
    color: #00d4ff;
  }
  .search-section-toggle {
    font-size: 10px;
    color: var(--text-secondary);
    transition: transform 0.3s ease;
  }
  .search-section-header.collapsed .search-section-toggle {
    transform: rotate(-90deg);
  }
  .search-section-content {
    padding: 12px;
    background: var(--bg-panel);
  }
  .search-section-content.collapsed {
    display: none;
  }
  .search-box { display: flex; gap: 8px; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input-wrap svg { position: absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; fill:var(--text-muted); }
  .search-input {
    width: 100%; padding: 12px 16px 12px 42px;
    background: var(--bg-card-hover);
    border: 1px solid var(--border-color); border-radius: 12px;
    color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; transition: all 0.3s ease;
  }
  .search-input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 20px var(--accent-bg); }
  .search-input::placeholder { color: var(--text-faint); }
  .search-btn {
    padding: 12px 20px; border: none; border-radius: 12px; color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.3s ease;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 20px var(--accent-bg);
  }
  .search-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,212,255,0.35); }
  .search-btn:active { transform: translateY(0); }

  .search-results {
    max-height: 280px; overflow-y: auto;
    background: var(--header-gradient);
    border: 1px solid var(--bg-card-hover); border-radius: 12px;
    display: none;
    margin-top: 10px;
    z-index: 200;
  }
  .search-results.show { display: block; }
  .search-result-item {
    padding: 12px 14px; border-bottom: 1px solid var(--bg-card);
    cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px;
  }
  .search-result-item:hover { background: var(--bg-card); }
  .search-result-item:last-child { border-bottom: none; }
  .result-icon {
    width: 28px; height: 28px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 12px;
    background: var(--bg-card-hover);
  }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-addr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-add-btn {
    padding: 6px 12px; border: none; border-radius: 6px;
    background: linear-gradient(135deg, #00d4ff, #7b2ff7);
    color: var(--text-primary); font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .result-add-btn:hover { transform: scale(1.05); }
  .result-add-btn.added { background: var(--border-color); color: var(--text-secondary); cursor: default; }

  /* Destinations Section */
  .destinations-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--bg-card-hover);
  }
  .destinations-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .destinations-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .destinations-count {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--bg-card-hover);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .destinations-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .destination-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--bg-card-hover);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .destination-tag:hover {
    background: var(--accent-bg);
    border-color: var(--accent-bg);
    color: #00d4ff;
  }
  .destination-tag .type-icon {
    font-size: 10px;
  }
  .empty-destinations {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ===== Calendar Styles - 苹果日历风格 ===== */
  .calendar-section {
    background: var(--cal-bg);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .calendar-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn {
    width: 24px;
    height: 24px;
    border: none;
    border-radius: 6px;
    background: var(--bg-card-hover);
    color: var(--text-primary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:hover {
    background: var(--border-color);
    color: var(--text-primary);
  }
  .month-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 100px;
    text-align: center;
  }
  .today-btn {
    padding: 4px 10px;
    border: none;
    border-radius: 6px;
    background: var(--accent-bg);
    color: #00d4ff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .today-btn:hover {
    background: rgba(0,212,255,0.25);
  }
  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
    padding: 4px 0;
    padding: 0 4px;
  }
  .weekday-row span {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calendar-list {
    display: grid;
    grid-template-rows: repeat(auto-fill, 1fr);
    gap: 2px;
  }
  .calendar-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .calendar-day {
    height: 110px;
    padding: 3px 3px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--bg-card);
    overflow: hidden;
    box-sizing: border-box;
    border: 1px solid transparent;
  }
  .calendar-day:hover {
    background: var(--cal-day-hover);
    border-color: var(--border-color);
    transform: translateY(-1px);
  }
  .calendar-day.other-month {
    opacity: 0.25;
  }
  .calendar-day.today {
    background: var(--cal-today-bg);
    border-color: var(--accent);
  }
  .calendar-day.today .day-number {
    color: var(--accent);
    font-weight: 700;
  }
  .calendar-day.selected {
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(123,97,255,0.2));
    border: 1px solid var(--accent);
    box-shadow: 0 0 12px var(--accent-bg);
  }
  .calendar-day.has-events {
    border: 1px solid var(--accent-bg);
    box-shadow: 0 0 8px var(--accent-bg);
    background: rgba(0,212,255,0.06);
  }
  .calendar-day.has-events:hover {
    border: 1px solid rgba(0,212,255,0.6);
    box-shadow: 0 0 12px rgba(0,212,255,0.25);
    background: var(--accent-bg);
  }
  .day-number {
    font-size: 16px;
    color: var(--text-primary);
    font-weight: 700;
    text-align: center;
    line-height: 1;
  }
  .day-events {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-top: 2px;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  .day-event {
    font-size: 9px;
    padding: 0 3px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .day-event-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .day-event.c0 { background: rgba(59,130,246,0.3); color: #93c5fd; }
  .day-event.c1 { background: rgba(168,85,247,0.3); color: #d8b4fe; }
  .day-event.c2 { background: rgba(245,158,11,0.3); color: #fcd34d; }
  .day-event.c3 { background: rgba(34,197,94,0.3); color: #86efac; }
  .day-event.c4 { background: rgba(239,68,68,0.3); color: #fca5a5; }
  .day-event.c5 { background: rgba(14,165,233,0.3); color: #7dd3fc; }
  .day-event.c6 { background: rgba(236,72,153,0.3); color: #f9a8d4; }
  .day-event.c7 { background: rgba(20,184,166,0.3); color: #5eead4; }
  .day-event.c8 { background: rgba(249,115,22,0.3); color: #fdba74; }
  .day-event.c9 { background: rgba(99,102,241,0.3); color: #a5b4fc; }
  .day-event.c10 { background: rgba(132,204,22,0.3); color: #bef264; }
  .day-event.c11 { background: rgba(225,29,72,0.3); color: #fda4af; }
  .calendar-sync-item {
    border-left: 2px solid rgba(123,47,247,0.3));
  }
  .day-event.more {
    background: transparent;
    color: var(--text-secondary);
    font-size: 9px;
    text-align: center;
    padding: 2px;
  }
  .day-event.done {
    opacity: 0.35;
    text-decoration: line-through;
  }
  .day-plan-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00ff88;
    margin: 2px auto 0;
  }
  .calendar-day.selected .day-number {
    color: var(--text-primary);
  }
  .day-color-bar {
    display: flex;
    gap: 2px;
    justify-content: center;
    padding: 1px 4px 2px;
    flex-shrink: 0;
  }
  .day-color-dot {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    opacity: 0.95;
  }
  .calendar-day.other-month .day-color-dot {
    opacity: 0.5;
  }
  .day-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #00ff88;
    margin-top: 2px;
  }

  /* Day Detail Section */
  .day-detail-section {
    background: var(--bg-panel);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 16px;
    margin-top: 12px;
  }
  .day-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .day-detail-date {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .add-plan-btn {
    padding: 6px 14px;
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 8px;
    background: rgba(0,255,136,0.08);
    color: #00ff88;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .add-plan-btn:hover {
    background: rgba(0,255,136,0.15);
    border-color: rgba(0,255,136,0.5);
    box-shadow: 0 0 15px rgba(0,255,136,0.15);
    transform: translateY(-1px);
  }
  .plan-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .empty-plans {
    padding: 30px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .plan-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .plan-item:hover {
    background: var(--bg-card-hover);
    border-color: var(--accent-bg);
    transform: translateX(2px);
  }
  .plan-item.done {
    opacity: 0.4;
  }
  .plan-item.done .plan-title {
    text-decoration: line-through;
    text-decoration-color: var(--text-secondary);
  }
  .plan-item .plan-col-content {
    width: 90px;
    min-width: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    overflow: hidden;
  }
  .plan-item .plan-col-date {
    flex: 1;
    min-width: 0;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .plan-item .plan-col-person {
    width: 60px;
    min-width: 50px;
    text-align: right;
    flex-shrink: 0;
  }
  .plan-date-text {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .plan-person-text {
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .day-detail-list {
    max-height: 50vh;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .day-detail-list::-webkit-scrollbar {
    width: 4px;
  }
  .day-detail-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .day-detail-list::-webkit-scrollbar-thumb {
    background: var(--text-secondary);
    border-radius: 2px;
  }
  .plan-expand-btn {
    text-align: center;
    padding: 8px;
    color: rgba(0,212,255,0.4);
    font-size: 11px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    border: 1px dashed var(--accent-bg);
    margin-top: 4px;
  }
  .plan-expand-btn:hover {
    color: #00d4ff;
    background: rgba(0,212,255,0.06);
    border-color: var(--accent-bg);
  }
  .plan-item[draggable="true"]:active {
    cursor: grabbing;
  }
  .plan-item.dragging {
    opacity: 0.4;
    border: 1px dashed rgba(0,212,255,0.4);
  }
  .plan-item.drag-over {
    border-top: 2px solid #00d4ff;
  }
  .plan-item .done-toggle {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--text-muted);
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .plan-item .done-toggle:hover {
    border-color: rgba(100,255,150,0.6);
    background: rgba(100,255,150,0.1);
  }
  .plan-item.done .done-toggle {
    border-color: rgba(100,255,150,0.7);
    background: rgba(100,255,150,0.2);
  }
  .plan-time {
    font-size: 12px;
    font-weight: 600;
    color: #00d4ff;
    min-width: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .plan-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .plan-person-tag {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.5;
    margin-left: 6px;
    padding: 0 4px;
    border-radius: 3px;
    background: var(--bg-card-hover);
  }
  .plan-dates {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 3px;
  }
  .plan-date-tag {
    font-size: 10px;
    padding: 0 5px;
    border-radius: 3px;
    background: var(--bg-card-hover);
    color: var(--text-secondary);
    line-height: 1.8;
    position: relative;
  }
  .plan-date-tag:not(:last-child)::after {
    content: '—';
    color: var(--border-color);
    margin-left: 1px;
    margin-right: 1px;
    font-size: 8px;
  }
  .plan-date-tag.current {
    background: var(--accent-bg);
    color: #00d4ff;
    font-weight: 600;
    border: 1px solid var(--accent-bg);
  }
  .plan-date-tag.current:not(:last-child)::after {
    color: var(--accent-bg);
  }
  .plan-content {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }
  .plan-title {
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .plan-location {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .plan-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .plan-item:hover .plan-actions {
    opacity: 1;
  }
  .plan-edit-btn {
    width: 26px; height: 26px; border: none;
    background: var(--accent-bg); color: var(--text-secondary);
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
  }
  .plan-edit-btn:hover {
    background: var(--accent-bg); color: var(--accent); transform: scale(1.1);
  }
  .plan-delete {
    width: 26px;
    height: 26px;
    border: none;
    border-radius: 6px;
    background: var(--danger-bg);
    color: var(--danger-bg);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .plan-delete:hover {
    background: var(--danger-bg);
    color: #ff6b6b;
  }

  /* Itinerary Stats */
  .itinerary-stats {
    display: flex;
    gap: 16px;
    padding: 16px;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .itinerary-stat {
    flex: 1;
    text-align: center;
  }
  .itinerary-stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #00ff88;
  }
  .itinerary-stat-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ===== Right Panel (Footprints) ===== */
  .footprint-panel {
    position: fixed; top: 76px; right: 16px; z-index: 100; width: 420px;
    max-height: calc(100vh - 92px);
    display: flex; flex-direction: column;
    background: var(--bg-panel); backdrop-filter: blur(24px);
    border: 1px solid var(--border-color); border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--glow-accent2), 0 8px 40px var(--shadow-color);
    transition: box-shadow 0.3s ease;
  }
  .panel-header {
    display: none;
  }
  .panel-title { font-size: 14px; font-weight: 600; color: var(--text-primary); display: none; }
  .panel-tabs { display: none; }
  .panel-tab { display: none; }

  /* Top Tabs */
  .panel-top-tabs {
    display: flex; border-bottom: 1px solid var(--border-color);
    background: var(--bg-card);
  }
  .top-tab {
    flex: 1; padding: 13px 0; border: none; background: transparent;
    color: var(--text-secondary); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.3s;
    text-align: center; letter-spacing: 0.5px;
    position: relative;
  }
  .top-tab.active {
    color: var(--accent);
    background: var(--accent-bg);
  }
  .top-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
    height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 1px;
  }
  .top-tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-card-hover); }

  /* Panel Content */
  .panel-content { padding: 0; }

  /* Toolbar */
  .panel-toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-bottom: 1px solid var(--bg-card-hover);
  }
  .toolbar-btn {
    padding: 5px 10px; border: 1px solid var(--border-color); border-radius: 6px;
    background: var(--bg-card); color: var(--text-primary);
    font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit;
    white-space: nowrap;
  }
  .toolbar-btn:hover { background: var(--border-color); color: var(--text-primary); }
  .toolbar-btn.danger { border-color: var(--danger-bg); }
  .toolbar-btn.danger:hover { background: var(--danger-bg); color: #ff6b6b; }

  /* Schedule Table */
  .schedule-month-label {
    font-size: 12px; color: var(--text-muted); text-align: right;
  }
  .schedule-table-wrap {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    min-height: 200px;
  }
  .schedule-table {
    width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px;
  }
  .schedule-table thead { position: sticky; top: 0; z-index: 2; }
  .schedule-table th {
    padding: 10px 8px; text-align: left; font-weight: 600;
    color: var(--text-secondary); font-size: 11px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border-color);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .schedule-table td {
    padding: 10px 8px; border-bottom: 1px solid var(--border-light);
    color: var(--text-primary); vertical-align: middle;
    transition: background 0.2s;
  }
  .schedule-table tr:hover td { background: var(--bg-card-hover); }
  .th-seq { width: 36px; text-align: center; }
  .th-content { width: 90px; }
  .th-person { width: 70px; }
  .th-time { width: 90px; text-align: center; }
  .th-action { width: 60px; text-align: center; }
  .td-seq { width: 30px; text-align: center; color: var(--text-muted); font-size: 12px; }
  .td-content { color: var(--text-primary); font-weight: 500; cursor: pointer; white-space: nowrap; width: 90px; max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .td-content:hover { color: #00d4ff; }
  .td-person { color: #00d4ff; font-size: 12px; width: 70px; text-align: center; }
  .td-time { color: var(--text-secondary); font-size: 12px; width: 90px; text-align: center; white-space: nowrap; }
  .td-action { width: 56px; text-align: center; white-space: nowrap; }
  .td-action button {
    border: none; background: var(--bg-card); cursor: pointer; font-size: 13px;
    padding: 4px 7px; border-radius: 6px; transition: all 0.2s;
    color: var(--text-secondary);
  }
  .td-action .edit-btn:hover { background: var(--accent-bg); color: var(--accent); }
  .td-action .del-btn:hover { background: var(--danger-bg); color: var(--danger); }
  .schedule-empty-row td {
    text-align: center; padding: 40px 10px; color: var(--text-faint);
  }
  .footprint-list {
    overflow-y: auto; flex: 1; display: flex; flex-direction: column;
    gap: 6px; padding: 8px 12px;
  }
  .footprint-list-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .footprint-list-section.collapsed {
    display: none;
  }
  .expand-more-btn {
    padding: 8px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
    border: 1px dashed var(--border-color);
    margin: 4px 0;
  }
  .expand-more-btn:hover {
    background: var(--bg-card);
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  /* Section headers */
  .list-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 2px; padding: 10px 12px 8px;
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none; border-radius: 10px;
    transition: all 0.2s ease;
    background: var(--bg-card);
    border: 1px solid var(--bg-card);
  }
  .list-section-title:hover { background: var(--bg-card-hover); border-color: var(--border-color); }
  .list-section-title.visited-title { color: rgba(0,212,255,0.5); }

  .list-section-title.upcoming-title { color: rgba(255,215,0,0.5); }
  .list-section-title.project-title { color: rgba(255,71,87,0.6); }
  .list-section-title .section-count {
    font-size: 10px; padding: 1px 8px; border-radius: 10px; font-weight: 400;
    background: var(--bg-card-hover);
  }
  .list-section-title .collapse-icon {
    margin-left: auto; font-size: 9px; opacity: 0.3;
    transition: transform 0.3s ease, opacity 0.2s;
  }
  .list-section-title:hover .collapse-icon { opacity: 0.6; }
  .list-section-title.collapsed .collapse-icon {
    transform: rotate(-90deg);
  }
  .visited-title .section-count { background: var(--accent-bg); }

  .upcoming-title .section-count { background: rgba(255,215,0,0.1); color: rgba(255,215,0,0.8); }
  .project-title .section-count { background: rgba(255,71,87,0.15); color: rgba(255,71,87,0.8); }
  .visibility-toggle {
    margin-left: auto; margin-right: 6px; font-size: 11px; opacity: 0.3;
    cursor: pointer; transition: opacity 0.2s; padding: 2px 4px; border-radius: 4px;
    background: none; border: none; line-height: 1;
  }
  .visibility-toggle:hover { opacity: 0.7; }
  .visibility-toggle.hidden { opacity: 0.15; text-decoration: line-through; }
  .list-section-title.collapsed .visibility-toggle { display: none; }

  .footprint-card {
    padding: 14px 16px; background: var(--bg-card); backdrop-filter: blur(20px);
    border: 1px solid var(--border-light); border-radius: 12px; cursor: pointer;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .footprint-card:hover {
    border-color: var(--border-color); background: var(--bg-card-hover);
    transform: translateX(2px);
  }
  .footprint-card.visited-card::after {
    content: ''; position: absolute; top:0; left:0; width:3px; height:100%;
    background: linear-gradient(to bottom, #00d4ff, #7b2ff7); border-radius: 0 2px 2px 0;
  }

  .footprint-card.upcoming-card::after {
    content: ''; position: absolute; top:0; left:0; width:3px; height:100%;
    background: linear-gradient(to bottom, #ffd700, #ffaa00); border-radius: 0 2px 2px 0;
  }
  .footprint-card.project-card::after {
    content: ''; position: absolute; top:0; left:0; width:3px; height:100%;
    background: linear-gradient(to bottom, #ff4757, #ff6b81); border-radius: 0 2px 2px 0;
  }
  .footprint-card.visited-card:hover { transform: translateX(-4px); border-color: var(--accent-bg); box-shadow: 0 4px 30px var(--accent-bg); }

  .footprint-card.upcoming-card:hover { transform: translateX(-4px); border-color: rgba(255,215,0,0.2); box-shadow: 0 4px 30px rgba(255,215,0,0.1); }
  .footprint-card.project-card:hover { transform: translateX(-4px); border-color: rgba(255,71,87,0.3); box-shadow: 0 4px 30px rgba(255,71,87,0.15); }

  .fp-header { display: flex; align-items: center; justify-content: space-between; }
  .fp-index { font-size: 10px; font-weight: 700; }
  .fp-index.visited-idx { color: rgba(0,212,255,0.5); }

  .fp-index.upcoming-idx { color: rgba(255,215,0,0.5); }
  .fp-index.project-idx { color: rgba(255,71,87,0.5); }
  .fp-badge {
    font-size: 9px; padding: 2px 7px; border-radius: 6px; font-weight: 600; letter-spacing: 1px;
  }
  .fp-badge.visited-badge { background: rgba(0,212,255,0.12); color: rgba(0,212,255,0.7); }

  .fp-badge.upcoming-badge { background: rgba(255,215,0,0.12); color: rgba(255,215,0,0.7); }
  .fp-badge.project-badge { background: rgba(255,71,87,0.15); color: rgba(255,71,87,0.9); }
  .fp-actions { display: flex; gap: 4px; }
  .fp-action-btn {
    width: 24px; height: 24px; background: none; border: none;
    color: var(--text-secondary); cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s;
  }
  .fp-action-btn:hover { color: #ff6b6b; background: var(--danger-bg); }
  .fp-action-btn.convert-btn:hover { color: #00ff88; background: rgba(0,255,136,0.1); }
  .fp-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 4px; }
  .fp-addr { font-size: 11px; color: var(--text-muted); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fp-time { font-size: 11px; margin-top: 6px; }
  .fp-time.visited-time { color: rgba(0,212,255,0.4); }

  .fp-time.upcoming-time { color: rgba(255,215,0,0.4); }
  .fp-time.project-time { color: rgba(255,71,87,0.4); }
  .fp-unlocked {
    font-size: 10px;
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
    background: var(--accent-bg);
    color: rgba(0,212,255,0.7);
  }

  .fp-unlocked.upcoming-unlocked {
    background: rgba(255,215,0,0.1);
    color: rgba(255,215,0,0.7);
  }
  .fp-unlocked.project-unlocked {
    background: var(--danger-bg);
    color: rgba(255,71,87,0.7);
  }

  /* ===== Leaflet Custom Popup ===== */
  .leaflet-popup-content-wrapper {
    background: var(--popup-bg) !important;
    backdrop-filter: blur(24px);
    border: 1px solid var(--border-color);
    border-radius: 16px !important;
    box-shadow: 0 12px 48px var(--shadow-color) !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip {
    background: var(--popup-bg) !important;
    border: 1px solid var(--border-color);
  }
  .leaflet-container a.leaflet-popup-close-button {
    color: var(--text-secondary) !important;
    top: 8px !important;
    right: 8px !important;
  }
  .leaflet-container a.leaflet-popup-close-button:hover {
    color: #ff6b6b !important;
  }

  .custom-popup {
    padding: 16px 20px;
    min-width: 220px;
    color: var(--text-primary);
    font-family: inherit;
  }
  .custom-popup.visited-popup { border-left: 3px solid #00d4ff; }

  .custom-popup.upcoming-popup { border-left: 3px solid #ffd700; }
  .custom-popup.project-popup { border-left: 3px solid #ff4757; }
  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .popup-title {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
  }
  .popup-title.visited { background: linear-gradient(135deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .popup-title.upcoming { background: linear-gradient(135deg, #ffd700, #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .popup-title.project { background: linear-gradient(135deg, #ff4757, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .popup-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;

    const { lat, lng } = e.latlng;
    
    // 使用高德逆地理编码获取地址信息
    let name = '新地点';
    let address = `${lng.toFixed(4)}, ${lat.toFixed(4)}`;
    
    try {
      const response = await fetch(`https://restapi.amap.com/v3/geocode/regeo?key=ebb9106d77a6f90d4e06ad9a726755f9&location=${lng.toFixed(6)},${lat.toFixed(6)}&extensions=all`);
      const data = await response.json();
      
      if (data && data.status === '1' && data.regeocode) {
        const regeo = data.regeocode;
        const pois = regeo.pois || [];
        const ac = regeo.addressComponent;
        
        if (pois.length > 0) {
          name = pois[0].name;
        } else {
          name = ac.district || ac.street || ac.township || '新地点';
        }
        
        address = regeo.formatted_address || `${lng.toFixed(4)}, ${lat.toFixed(4)}`;
      }
    } catch (err) {
      console.error('Reverse geocoding error:', err);
    }
    
    // 直接添加足迹，不弹出编辑框
    addFootprintWithReturn(name, address, [lng, lat], currentMode);
  });

  applyTheme(currentTheme);

function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--dur', (2+Math.random()*4)+'s');
    s.style.setProperty('--op', (0.2+Math.random()*0.6));
    s.style.animationDelay = Math.random()*4+'s';
    c.appendChild(s);
  }
}

// ===== Toggle Search Section =====
function toggleSearchSection() {
  const header = document.querySelector('.search-section-header');
  const content = document.getElementById('searchSectionContent');

  const isCollapsed = content.classList.toggle('collapsed');
  header.classList.toggle('collapsed', isCollapsed);
}

// ===== Calendar Functions - 苹果日历风格 =====
function renderCalendar() {
  const list = document.getElementById('calendarList');
  list.innerHTML = '';
  
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  document.getElementById('monthLabel').textContent = `${year}年${month + 1}月`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startPadding = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  const today = new Date();
  const totalDays = startPadding + daysInMonth;
  const totalWeeks = Math.ceil(totalDays / 7);
  
  for (let week = 0; week < totalWeeks; week++) {
    const weekRow = document.createElement('div');
    weekRow.className = 'calendar-week';
    
    for (let dayOfWeek = 0; dayOfWeek < 7; dayOfWeek++) {
      const dayIndex = week * 7 + dayOfWeek;
      let dayNum, isOtherMonth, dateObj;
      
      if (dayIndex < startPadding) {
        // 上月日期
        const prevMonth = new Date(year, month, 0);
        dayNum = prevMonth.getDate() - (startPadding - dayIndex - 1);
        isOtherMonth = true;
        dateObj = new Date(year, month - 1, dayNum);
      } else if (dayIndex >= startPadding + daysInMonth) {
        // 下月日期
        dayNum = dayIndex - (startPadding + daysInMonth) + 1;
        isOtherMonth = true;
        dateObj = new Date(year, month + 1, dayNum);
      } else {
        // 当月日期
        dayNum = dayIndex - startPadding + 1;
        isOtherMonth = false;
        dateObj = new Date(year, month, dayNum);
      }
      
      const dateKey = formatDateKey(dateObj);
      const isToday = dateObj.toDateString() === today.toDateString();
      const isSelected = selectedDate && dateObj.toDateString() === selectedDate.toDateString();
      const dayPlans = itinerary[dateKey] || [];
      const calendarEvents = CALENDAR_EVENTS[dateKey] || [];
      const daySchedule = (scheduleItems || []).filter(s =>
        (s.date === dateKey || s.endDate === dateKey || (s.date < dateKey && s.endDate > dateKey))
      );
      
      const dayEl = createDayElement(dayNum, isOtherMonth, isToday, dayPlans, isSelected, dateObj, calendarEvents, daySchedule);
      weekRow.appendChild(dayEl);
    }
    
    list.appendChild(weekRow);
  }
}

function createDayElement(day, isOtherMonth, isToday, plans, isSelected, dateObj, calendarEvents, daySchedule) {
  try {
  const div = document.createElement('div');
  div.className = 'calendar-day';
  if (isOtherMonth) div.classList.add('other-month');
  if (isToday) div.classList.add('today');
  if (isSelected) div.classList.add('selected');
  if (plans.length > 0 || (calendarEvents && calendarEvents.length > 0)) div.classList.add('has-events');
  
  // 合并并去重
  const seen = new Set();
  const allItems = [];
  // 先加行程计划
  (plans || []).forEach(p => {
    const key = (p.title).trim();
    if (!seen.has(key)) {
      seen.add(key);
      allItems.push({ text: p.title, type: 'plan', color: p.color || '', person: p.person || '' });
    }
  });
  // 再加日历清单事件
  (calendarEvents || []).forEach(e => {
    const key = (e.title || '').trim();
    if (!seen.has(key)) {
      seen.add(key);
      const { city, person } = extractPersonFromTitle(e.title);
      allItems.push({ text: city || e.title, type: 'calendar', color: '', person: person || '' });
    }
  });
  // 再加项目安排
  (daySchedule || []).forEach(s => {
    const key = (s.content || '').trim();
    if (!seen.has(key)) {
      seen.add(key);
      allItems.push({ text: s.content, type: 'schedule', color: '', person: s.person || '' });
    }
  });
  
  // 全局颜色映射：同一标题同一颜色，但同一天内颜色不重复
  if (!window._calendarColorMap) window._calendarColorMap = {};
  const PALETTE = ['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#0ea5e9','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#e11d48'];
  function getColor(name) {
    if (!(name in window._calendarColorMap)) {
      window._calendarColorMap[name] = Object.keys(window._calendarColorMap).length % PALETTE.length;
    }
    return window._calendarColorMap[name];
  }
  
  // 确保同一天内颜色不重复
  const usedColorsToday = new Set();
  allItems.forEach(item => {
    let ci = item.color ? -1 : getColor(item.text);
    if (ci >= 0 && usedColorsToday.has(ci)) {
      // 找下一个未使用的颜色
      for (let i = 0; i < PALETTE.length; i++) {
        if (!usedColorsToday.has(i)) { ci = i; break; }
      }
    }
    if (ci >= 0) usedColorsToday.add(ci);
    item._ci = ci;
  });
  
  const dateKey = formatDateKey(dateObj);
  const displayItems = allItems.slice(0, 4);
  const totalCount = allItems.length;
  
  // 底部彩色色块指示器
  let colorBarHtml = '';
  if (allItems.length > 0) {
    colorBarHtml = '<div class="day-color-bar">';
    allItems.forEach(item => {
      const dotColor = item.color || PALETTE[item._ci];
      colorBarHtml += `<span class="day-color-dot" style="background:${dotColor}"></span>`;
    });
    colorBarHtml += '</div>';
  }
  
  let eventsHtml = '';
  if (displayItems.length > 0) {
    eventsHtml = '<div class="day-events">';
    displayItems.forEach((item, idx) => {
      // 用户自定义颜色优先，否则用自动分配颜色
      const style = item.color ? `style="background:${item.color}22;color:${item.color}"` : '';
      const c = style ? '' : 'c' + item._ci;
      const doneKey = `${dateKey}_${item.text}`;
      const isDone = planDoneSet.has(doneKey);
      const dotColor = item.color || PALETTE[item._ci];
      const personTag = item.person ? `<span style="opacity:0.45;font-size:8px">(${item.person})</span>` : '';
      eventsHtml += `<div class="day-event ${c}${isDone ? ' done' : ''}" ${style}><span class="day-event-dot" style="background:${dotColor}"></span>${item.text}${personTag}</div>`;
    });
    if (totalCount > 4) {
      eventsHtml += `<div class="day-event more">+${totalCount - 4} 更多</div>`;
    }
    eventsHtml += '</div>';
  }
  
  div.innerHTML = `
    <span class="day-number">${day}</span>
    ${eventsHtml}
    ${colorBarHtml}
  `;
  
  div.onclick = () => selectDate(dateObj);
  div.ondblclick = () => {
    selectDate(dateObj);
    openPlanModal();
  };
  
  return div;
  } catch(e) { console.error('createDayElement error:', e); return document.createElement('div'); }
}

function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function goToToday() {
  const today = new Date();
  currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  selectedDate = new Date(today);

}

function selectDate(date) {

// 点击日历项目跳转到地图对应位置
const PERSON_NAMES = ['陈志勇', '程广超', '骈一鑫', '李彦赛', '张恩林'];

function extractPersonFromTitle(title) {
  if (!title) return { city: title, person: '' };
  for (const name of PERSON_NAMES) {
    const idx = title.lastIndexOf(name);
    if (idx >= 0) {
      const city = (title.substring(0, idx) + title.substring(idx + name.length)).trim();
      return { city: city || title, person: name };
    }
  }
  return { city: title, person: '' };
}

function flyToEvent(title) {
  // 先提取城市名再匹配
  const { city } = extractPersonFromTitle(title);
  const searchName = city || title;
  const fp = footprints.find(f => (f.name || '').includes(searchName) || (f.address || '').includes(searchName) || (f.name || '').includes(title));
  if (fp) {
    map.flyTo([fp.lat, fp.lng], 10, { duration: 0.8 });
    // 高亮对应标记
    const marker = markers[fp.id];
    if (marker) {
      const el = marker.getElement();
      if (el) {
        el.style.transform = 'scale(1.3)';
        el.style.transition = 'transform 0.3s';
        setTimeout(() => { el.style.transform = ''; }, 1500);
      }
    }
  } else {
    showToast('📍 未找到对应的地图标注', 'info');
  }
}

function renderDayDetail() {
  const dateKey = formatDateKey(selectedDate);
  const plans = itinerary[dateKey] || [];
  const calEvents = CALENDAR_EVENTS[dateKey] || [];
  // 查找当天的项目安排（包含跨天匹配）
  const scheduleForDay = (scheduleItems || []).filter(s =>
    (s.date === dateKey || s.endDate === dateKey || (s.date < dateKey && s.endDate > dateKey))
  );
  const section = document.getElementById('dayDetailSection');
  const list = document.getElementById('dayDetailList');
  
  // 显示区域
  section.style.display = 'block';
  
  // 更新日期标题
  const m = selectedDate.getMonth() + 1;
  const d = selectedDate.getDate();
  const weekDay = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][selectedDate.getDay()];
  document.getElementById('selectedDateDetail').textContent = `${m}月${d}日 ${weekDay}`;
  
  if (plans.length === 0 && calEvents.length === 0 && scheduleForDay.length === 0) {
    list.innerHTML = '<div class="empty-plans">这一天还没有安排<br>点击「添加」开始规划 ✨</div>';
    return;
  }
  
  let html = '';
  
  // 获取颜色映射（与日历共享）
  if (!window._calendarColorMap) window._calendarColorMap = {};
  function getColor(name) {
    if (!(name in window._calendarColorMap)) {
      window._calendarColorMap[name] = Object.keys(window._calendarColorMap).length % 12;
    }
    return window._calendarColorMap[name];
  }
  const DOT_COLORS = ['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#0ea5e9','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#e11d48'];
  
  const seen = new Set();
  const merged = [];
  
  // 计算前后日期，查找相邻日期中的同名事件
  function getSurroundingDates(title) {
    const dates = [];
    const sel = new Date(selectedDate);
    for (let offset = -3; offset <= 3; offset++) {
      const d = new Date(sel);
      d.setDate(d.getDate() + offset);
      const dk = formatDateKey(d);
      const evts = CALENDAR_EVENTS[dk] || [];
      evts.forEach(e => {
        if ((e.title || '').trim() === title) {
          const dayNum = d.getDate();
          const m = d.getMonth() + 1;
          if (!dates.some(x => x.day === dayNum && x.month === m)) {
            dates.push({ day: dayNum, month: m, key: dk, source: e.source });
          }
        }
      });
      const p2 = itinerary[dk] || [];
      p2.forEach(p => {
        if ((p.title || '').trim() === title || (p.locationName || '').trim() === title) {
          const dayNum = d.getDate();
          const m = d.getMonth() + 1;
          if (!dates.some(x => x.day === dayNum && x.month === m)) {
            dates.push({ day: dayNum, month: m, key: dk });
          }
        }
      });
    }
    dates.sort((a, b) => a.key.localeCompare(b.key));
    return dates;
  }
  
  // 确保同一天内颜色不重复
  const seenColors = new Set();
  const seenTitles = new Set(); // 用标准化标题去重
  function normalizeTitle(t) {
    const { city, person } = extractPersonFromTitle(t || '');
    return city || (t || '').trim();
  }
  calEvents.forEach(ev => {
    const normKey = normalizeTitle(ev.title);
    if (!seenTitles.has(normKey)) {
      seenTitles.add(normKey);
      let ci = getColor(normKey);
      if (seenColors.has(ci)) {
        for (let i = 0; i < DOT_COLORS.length; i++) { if (!seenColors.has(i)) { ci = i; break; } }
      }
      seenColors.add(ci);
      const dates = getSurroundingDates(ev.title);
      merged.push({ title: ev.title, type: 'calendar', dates, _ci: ci });
    }
  });
  plans.forEach(p => {
    const normKey = normalizeTitle(p.title) || (p.locationName || '').trim();
    if (!seenTitles.has(normKey)) {
      seenTitles.add(normKey);
      let ci = getColor(normKey);
      if (seenColors.has(ci)) {
        for (let i = 0; i < DOT_COLORS.length; i++) { if (!seenColors.has(i)) { ci = i; break; } }
      }
      seenColors.add(ci);
      const dates = getSurroundingDates(p.locationName || p.title);
      merged.push({ title: p.locationName || p.title, type: 'plan', plan: p, dates, _ci: ci });
    }
  });
  
  // 加入项目安排
  scheduleForDay.forEach(s => {
    const normKey = (s.content || '').trim();
    if (!seenTitles.has(normKey)) {
      seenTitles.add(normKey);
      let ci = getColor(normKey);
      if (seenColors.has(ci)) {
        for (let i = 0; i < DOT_COLORS.length; i++) { if (!seenColors.has(i)) { ci = i; break; } }
      }
      seenColors.add(ci);
      const dateRange = s.date !== s.endDate ? `${s.date.slice(5)}~${s.endDate.slice(5)}` : s.date.slice(5);
      merged.push({ title: s.content, type: 'schedule', schedule: s, dates: [{ day: selectedDate.getDate(), month: selectedDate.getMonth() + 1, key: dateKey }], _ci: ci, dateRange });
    }
  });
  
  // 按序号渲染，默认只显示前5个
  const COLLAPSE_COUNT = 5;
  const showAll = dayDetailExpanded.has(dateKey);
  const visibleItems = showAll ? merged : merged.slice(0, COLLAPSE_COUNT);
  const hiddenCount = merged.length - COLLAPSE_COUNT;
  
  visibleItems.forEach((item, idx) => {
    const colorIdx = item._ci !== undefined ? item._ci : getColor(item.title);
    const dotColor = item.plan?.color || DOT_COLORS[colorIdx];
    const doneKey = `${dateKey}_${item.title}`;
    const isDone = planDoneSet.has(doneKey);
    
    // 提取负责人
    let personName = '';
    if (item.type === 'calendar') {
      const { person: extractedPerson } = extractPersonFromTitle(item.title);
      personName = extractedPerson || '';
    } else if (item.type === 'schedule') {
      personName = item.schedule?.person || '';
    } else {
      let planPerson = item.plan?.person || '';
      if (!planPerson && item.plan?.locationId) {
        const fp = footprints.find(f => f.id === item.plan.locationId);
        if (fp?.person) planPerson = fp.person;
      }
      if (!planPerson) {
        const { person: extracted } = extractPersonFromTitle(item.title);
        planPerson = extracted || '';
      }
      personName = planPerson;
    }
    
    // 提取城市名作为内容
    let cityContent = item.title;
    if (item.type === 'calendar') {
      const { city } = extractPersonFromTitle(item.title);
      if (city) cityContent = city;
    }
    
    // 构建日期标签
    let dateText = '';
    if (item.type === 'schedule' && item.dateRange) {
      dateText = item.dateRange;
    } else if (item.dates && item.dates.length > 1) {
      const first = item.dates[0];
      const last = item.dates[item.dates.length - 1];
      const prefix1 = (first.month !== (selectedDate.getMonth() + 1)) ? `${first.month}/` : '';
      const prefix2 = (last.month !== (selectedDate.getMonth() + 1)) ? `${last.month}/` : '';
      dateText = `${prefix1}${first.day}-${prefix2}${last.day}日`;
    } else {
      dateText = `${m}月${d}日`;
    }
    
    if (item.type === 'calendar') {
      html += `
      <div class="plan-item calendar-sync-item ${isDone ? 'done' : ''}" onclick="flyToEvent('${item.title.replace(/'/g, "\\'")}')" ondblclick="editCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')">
        <div class="done-toggle" onclick="event.stopPropagation(); togglePlanDone('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="${isDone ? '取消完成' : '标记完成'}">${isDone ? '✓' : ''}</div>
        <span class="plan-time"><span class="plan-dot" style="background:${dotColor}"></span></span>
        <div class="plan-col-content" onclick="event.stopPropagation(); flyToEvent('${item.title.replace(/'/g, "\\'")}')">
          <span class="plan-title">${cityContent}</span>
        </div>
        <div class="plan-col-date"><span class="plan-date-text">${dateText}</span></div>
        <div class="plan-col-person"><span class="plan-person-text">${personName || '-'}</span></div>
        <div class="plan-actions">
          <button class="plan-edit-btn" onclick="event.stopPropagation(); editCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="编辑">✎</button>
          <button class="plan-delete" onclick="event.stopPropagation(); removeCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="删除">✕</button>
        </div>
      </div>`;
    } else if (item.type === 'schedule') {
      html += `
      <div class="plan-item calendar-sync-item ${isDone ? 'done' : ''}">
        <span class="plan-time"><span class="plan-dot" style="background:${dotColor}"></span></span>
        <div class="plan-col-content" onclick="event.stopPropagation(); flyToEvent('${item.title.replace(/'/g, "\\'")}')">
          <span class="plan-title">${cityContent}</span>
        </div>
        <div class="plan-col-date"><span class="plan-date-text">${dateText}</span></div>
        <div class="plan-col-person"><span class="plan-person-text">${personName || '-'}</span></div>
      </div>`;
    } else {
      const plan = item.plan;
      const planIdx = plans.indexOf(plan);
      html += `
      <div class="plan-item ${isDone ? 'done' : ''}" ${item.planColor ? `style="border-left: 3px solid ${item.planColor}"` : ''} ondblclick="editPlanItem('${dateKey}', ${planIdx})">
        <div class="done-toggle" onclick="event.stopPropagation(); togglePlanDone('${dateKey}', '${(plan.title || '').replace(/'/g, "\\'")}')" title="${isDone ? '取消完成' : '标记完成'}">${isDone ? '✓' : ''}</div>
        <span class="plan-time"><span class="plan-dot" style="background:${dotColor}"></span></span>
        <div class="plan-col-content" onclick="event.stopPropagation(); flyToEvent('${item.title.replace(/'/g, "\\'")}')">
          <span class="plan-title">${cityContent}</span>
        </div>
        <div class="plan-col-date"><span class="plan-date-text">${dateText}</span></div>
        <div class="plan-col-person"><span class="plan-person-text">${personName || '-'}</span></div>
        <div class="plan-actions">
          <button class="plan-edit-btn" onclick="event.stopPropagation(); editPlanItem('${dateKey}', ${planIdx})" title="编辑">✎</button>
          <button class="plan-delete" onclick="event.stopPropagation(); deletePlan('${dateKey}', ${planIdx})" title="删除">✕</button>
        </div>
      </div>`;
    }
  });
  
  // 折叠/展开按钮
  if (hiddenCount > 0 && !showAll) {
    html += `<div class="plan-expand-btn" onclick="toggleDayDetailExpand()">展开剩余 ${hiddenCount} 项 ▾</div>`;
  } else if (showAll && merged.length > COLLAPSE_COUNT) {
    html += `<div class="plan-expand-btn" onclick="toggleDayDetailExpand()">收起 ▴</div>`;
  }
  
  list.innerHTML = html;
}

function toggleDayDetailExpand() {
  const dateKey = formatDateKey(selectedDate);
  if (dayDetailExpanded.has(dateKey)) {
    dayDetailExpanded.delete(dateKey);
  } else {
    dayDetailExpanded.add(dateKey);
  }
  renderDayDetail();
}

function formatDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}



function locatePlan(locationId) {
  if (!locationId || !markers[locationId]) return;
  const fp = footprints.find(f => f.id === locationId);
  if (fp) {
    map.setView([fp.lat, fp.lng], 14);
    markers[locationId].openPopup();
  }
}

let editingPlanIdx = null;
let editingCalendarOldTitle = null;

  const key = `${dateKey}_${title}`;
  if (planDoneSet.has(key)) {
    planDoneSet.delete(key);
  } else {
    planDoneSet.add(key);
  }
  localStorage.setItem(DONE_KEY, JSON.stringify([...planDoneSet]));
  renderCalendar();
  renderDayDetail();
}

// ===== Edit Footprint Modal =====
let editingFootprintId = null;

function openEditFootprintModal(fpId) {
  const fp = footprints.find(f => f.id === fpId);
  if (!fp) return;
  
  editingFootprintId = fpId;
  const modal = document.getElementById('editFootprintModal');
  
  document.getElementById('editFpId').value = fpId;
  document.getElementById('editFpNameInput').value = fp.name;
  document.getElementById('editFpAddressInput').value = fp.address;
  document.getElementById('editFpTimeInput').value = fp.time || '';
  document.getElementById('editFpUnlockedInput').value = fp.unlocked !== null && fp.unlocked !== undefined ? fp.unlocked : '';
  document.getElementById('editFpTypeInput').value = fp.type;
  document.getElementById('editFpPersonInput').value = fp.person || '';
  
  // 更新弹窗标题
  const typeTitles = { visited: '✎ 编辑足迹', upcoming: '✎ 编辑CGC项目', project: '✎ 编辑近期项目' };
  document.getElementById('editFpModalTitle').textContent = typeTitles[fp.type];
  
  modal.classList.add('show');
  document.getElementById('editFpNameInput').focus();
}

function closeEditFootprintModal() {
  document.getElementById('editFootprintModal').classList.remove('show');
  editingFootprintId = null;
}

function saveEditFootprint() {
  const name = document.getElementById('editFpNameInput').value.trim();
  const address = document.getElementById('editFpAddressInput').value.trim();
  const timeStr = document.getElementById('editFpTimeInput').value.trim();
  const unlockedValue = document.getElementById('editFpUnlockedInput').value;
  const type = document.getElementById('editFpTypeInput').value;
  const person = document.getElementById('editFpPersonInput').value;
  
  if (!name) {
    showToast('❌ 请输入地点名称', 'error');
    return;
  }
  
  if (!editingFootprintId) {
    showToast('❌ 编辑信息丢失', 'error');
    return;
  }
  
  const fpIndex = footprints.findIndex(f => f.id === editingFootprintId);
  if (fpIndex === -1) {
    showToast('❌ 足迹不存在', 'error');
    return;
  }
  
  // 解锁百分比
  const unlocked = unlockedValue ? parseFloat(unlockedValue) : null;
  
  // 更新足迹数据
  footprints[fpIndex].name = name;
  footprints[fpIndex].address = address || `${footprints[fpIndex].lng.toFixed(4)}, ${footprints[fpIndex].lat.toFixed(4)}`;
  footprints[fpIndex].time = timeStr || new Date().toLocaleString('zh-CN');
  footprints[fpIndex].unlocked = unlocked;
  footprints[fpIndex].person = person;
  
  // 如果类型变了，需要重新渲染
  const oldType = footprints[fpIndex].type;
  footprints[fpIndex].type = type;
  
  save();
  renderFootprints();
  updateStats();
  
  // 重新创建标记（可能负责人变了需要更新显示）
  renderAllMarkers();
  
  closeEditFootprintModal();
  showToast('✅ 已保存修改', 'success');
}

function savePlan() {
  const title = document.getElementById('planTitle').value.trim();
  const color = selectedPlanColor;
  const person = document.getElementById('planPerson').value;
  
  if (!title) {
    showToast('请输入行程内容', 'error');
    return;
  }
  
    if (editingCalendarOldTitle) {
    // 编辑日历清单事件
    const dateKey = editingPlanKey;
    if (CALENDAR_EVENTS[dateKey]) {
      const ev = CALENDAR_EVENTS[dateKey].find(e => e.title === editingCalendarOldTitle);
      if (ev) {
        // 用新标题+负责人拼接
        ev.title = person ? title + ' ' + person : title;
      }
    }
    saveCalendarEvents();
    editingCalendarOldTitle = null;
    renderCalendar();
    renderDayDetail();
    closePlanModal();
    showToast('✅ 事件已更新', 'success');
  } else if (editingPlanKey && editingPlanIdx !== null) {
    // 编辑模式：更新现有行程
    const dateKey = editingPlanKey;
    const planIdx = editingPlanIdx;
    const old = itinerary[dateKey][planIdx];
    // 标题用新内容，负责人单独保存
    itinerary[dateKey][planIdx] = { title, color: color || old.color || '', person: person || old.person || '', locationId: old.locationId || '', locationName: old.locationName || '' };
    localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
    triggerAutoSync();
    renderCalendar();
    renderDayDetail();
    closePlanModal();
    showToast('✅ 行程已更新', 'success');
  } else {
    // 添加模式
    const dateKey = formatDateKey(selectedDate);
    if (!itinerary[dateKey]) itinerary[dateKey] = [];
    itinerary[dateKey].push({ title, color, person, locationId: '', locationName: '' });
    localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
    triggerAutoSync();
    renderCalendar();
    renderDayDetail();
    closePlanModal();
    showToast('✅ 行程添加成功', 'success');
  }
}

function deletePlan(dateKey, idx) {
  itinerary[dateKey].splice(idx, 1);
  if (itinerary[dateKey].length === 0) delete itinerary[dateKey];
  localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));
  triggerAutoSync();
  renderCalendar();
  renderDayDetail();
  updateItineraryStats();
  drawRouteLine();
  showToast('🗑️ 行程已删除', 'error');
}

function removeCalendarEvent(dateKey, title) {
  if (CALENDAR_EVENTS[dateKey]) {
    CALENDAR_EVENTS[dateKey] = CALENDAR_EVENTS[dateKey].filter(e => e.title !== title);
    if (CALENDAR_EVENTS[dateKey].length === 0) delete CALENDAR_EVENTS[dateKey];
    saveCalendarEvents();
    renderCalendar();
    renderDayDetail();
    showToast('🗑️ 事件已删除', 'error');
  }
}

function editPlanItem(dateKey, planIdx) {
  if (planIdx < 0 || !itinerary[dateKey] || !itinerary[dateKey][planIdx]) return;
  const plan = itinerary[dateKey][planIdx];
  editingPlanKey = dateKey;
  editingPlanIdx = planIdx;
  selectedPlanColor = plan.color || '';
  document.getElementById('planModalTitle').textContent = '✎ 编辑行程';
  document.getElementById('planTitle').value = plan.title || '';
  document.getElementById('planPerson').value = plan.person || '';
  // 设置颜色选择器
  document.querySelectorAll('#colorPickerRow .color-dot').forEach(d => {
    d.classList.toggle('selected', d.dataset.color === (plan.color || ''));
  });
  document.getElementById('planModal').classList.add('show');
  document.getElementById('planTitle').focus();
}

function editCalendarEvent(dateKey, title) {
  const modal = document.getElementById('planModal');
  const modalTitle = document.getElementById('planModalTitle');
  const input = document.getElementById('planTitle');
  
  editingPlanKey = dateKey;
  editingPlanIdx = null; // 标记为日历事件
  editingCalendarOldTitle = title;
  selectedPlanColor = '';
  modalTitle.textContent = '✎ 编辑事件';
  
  // 提取城市名填入标题输入框，负责人预填
  const { city, person } = extractPersonFromTitle(title);

  document.querySelectorAll('#colorPickerRow .color-dot').forEach(d => {

  });

}

function updateItineraryStats() {
  const allPlans = Object.values(itinerary).flat();
  const uniqueDates = Object.keys(itinerary).length;
  const uniqueCities = new Set(allPlans.filter(p => p.locationId).map(p => {
    const fp = footprints.find(f => f.id === p.locationId);
    return fp ? fp.name : null;
  }).filter(Boolean)).size;
  
  const planDaysEl = document.getElementById('planDays');
  const planCitiesEl = document.getElementById('planCities');
  const planSpotsEl = document.getElementById('planSpots');
  if (planDaysEl) planDaysEl.textContent = uniqueDates;
  if (planCitiesEl) planCitiesEl.textContent = uniqueCities;
  if (planSpotsEl) planSpotsEl.textContent = allPlans.length;
  
  renderDestinations();
}

function renderDestinations() {
  const container = document.getElementById('destinationsList');
  if (!container) return;
  const allPlans = Object.values(itinerary).flat();
  const uniqueLocations = [...new Set(allPlans.filter(p => p.locationId).map(p => p.locationId))];
  
  const destCountEl = document.getElementById('destCount');
  if (destCountEl) destCountEl.textContent = uniqueLocations.length;
  
  if (uniqueLocations.length === 0) {
    container.innerHTML = '<div class="empty-destinations">还没有规划目的地<br>在地图上标记地点或搜索添加</div>';
    return;
  }
  
  container.innerHTML = '';
  uniqueLocations.forEach(id => {
    const fp = footprints.find(f => f.id === id);
    if (!fp) return;
    
    const tag = document.createElement('div');
    tag.className = 'destination-tag';
    const typeIcons = { visited: '✓', upcoming: '●', project: '●' };
    tag.innerHTML = `<span class="type-icon">${typeIcons[fp.type] || '📍'}</span>${fp.name}`;
    tag.onclick = () => {
      map.setView([fp.lat, fp.lng], 14);
      if (markers[fp.id]) markers[fp.id].openPopup();
    };
    container.appendChild(tag);
  });
}

// ===== Route Line =====
function drawRouteLine() {
  if (routeLine) {
    map.removeLayer(routeLine);
    routeLine = null;
  }
  
  const sortedDates = Object.keys(itinerary).sort();
  const path = [];
  
  sortedDates.forEach(dateKey => {
    itinerary[dateKey].forEach(plan => {
      if (plan.locationId) {
        const fp = footprints.find(f => f.id === plan.locationId);
        if (fp) path.push([fp.lat, fp.lng]);
      }
    });
  });
  
  if (path.length < 2) return;
  
  routeLine = L.polyline(path, {
    color: '#00ff88',
    weight: 3,
    dashArray: '10, 5',
    lineJoin: 'round',
    lineCap: 'round'
  }).addTo(map);
}

// ===== Search using 本地数据（无需联网）=====
function doSearch() {
  const keyword = document.getElementById('searchInput').value.trim();
  if (!keyword) return;
  
  const mode = currentMode;
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">搜索中...</div>';
  container.classList.add('show');

  // 使用本地数据搜索
  const lowerKeyword = keyword.toLowerCase();
  const results = CHINA_LOCATIONS.filter(loc => 
    loc.name.toLowerCase().includes(lowerKeyword) || 
    loc.address.toLowerCase().includes(lowerKeyword)
  ).slice(0, 10);
  
  container.innerHTML = '';
  
  if (results.length > 0) {
    renderSearchResults(results, mode);
  } else {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">未找到相关地点 😢<br><span style="font-size:11px;opacity:0.7;">试试搜索：北京、上海、杭州、成都...</span></div>';
  }
}

function renderSearchResults(results, mode) {
  const container = document.getElementById('searchResults');
  results.forEach((result) => {
    const isAdded = footprints.some(f => f.name === result.name && Math.abs(f.lng - result.lon) < 0.001 && f.type === mode);
    const item = document.createElement('div');
    item.className = 'search-result-item';
    const iconEmojis = { visited: '📍', upcoming: '●', project: '●' };
    item.innerHTML = `
      <div class="result-icon">${iconEmojis[mode]}</div>
      <div class="result-info">
        <div class="result-name">${result.name}</div>
        <div class="result-addr">${result.address}</div>
      </div>
      <button class="result-add-btn ${isAdded ? 'added' : ''}">
        ${isAdded ? '✓ 已添加' : '+ 添加'}
      </button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('result-add-btn')) return;
      map.setView([result.lat, result.lon], 14);
    });
    const addBtn = item.querySelector('.result-add-btn');
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isAdded) return;
      addFootprint(result.name, result.address, [result.lon, result.lat], mode);
      addBtn.textContent = '✓ 已添加';
      addBtn.classList.add('added');
    });
    container.appendChild(item);
  });
}
