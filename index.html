﻿<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>超大人项目规划 🗺️</title>

<!-- Leaflet CSS -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Supabase Cloud DB (REST API, no SDK needed) -->

<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');



  /* ===== Theme Variables ===== */

  :root, .dark-theme {

    --bg-primary: #0a0e27;

    --bg-panel: rgba(10,14,39,0.45);

    --bg-card: rgba(0,0,0,0.06);

    --bg-card-hover: rgba(0,0,0,0.1);

    --bg-input: rgba(255,255,255,0.06);

    --border-color: rgba(255,255,255,0.08);

    --border-light: rgba(255,255,255,0.04);

    --text-primary: rgba(255,255,255,0.95);

    --text-secondary: rgba(255,255,255,0.65);

    --text-muted: rgba(255,255,255,0.4);

    --text-faint: rgba(255,255,255,0.2);

    --accent: #00d4ff;

    --accent-bg: rgba(0,212,255,0.08);

    --danger: #ff4757;

    --danger-bg: rgba(255,71,87,0.12);

    --warning: #ffd700;

    --success: #2ed573;

    --shadow-color: rgba(0,0,0,0.55);

    --header-gradient: rgba(10,14,39,0.45);

    --header-gradient-end: rgba(10,14,39,0.3);

    --star-opacity: 0.3;

    --cal-bg: rgba(0,0,0,0.15);

    --cal-day-hover: rgba(255,255,255,0.06);

    --cal-today-bg: rgba(0,212,255,0.15);

    --scrollbar-thumb: rgba(255,255,255,0.1);

    --marker-shadow: rgba(0,0,0,0.3);

    --popup-bg: rgba(20,24,50,0.95);

    --schedule-header-bg: rgba(0,212,255,0.06);

    --schedule-stripe: rgba(0,212,255,0.8);

  }

  .light-theme {

    --bg-primary: #e8ecf0;

    --bg-panel: rgba(30,38,50,0.75);

    --bg-card: rgba(0,0,0,0.12);

    --bg-card-hover: rgba(0,0,0,0.2);

    --bg-input: rgba(255,255,255,0.1);

    --border-color: rgba(255,255,255,0.08);

    --border-light: rgba(255,255,255,0.05);

    --text-primary: rgba(255,255,255,0.95);

    --text-secondary: rgba(255,255,255,0.7);

    --text-muted: rgba(255,255,255,0.45);

    --text-faint: rgba(255,255,255,0.2);

    --accent: #4dc9f6;

    --accent-bg: rgba(77,201,246,0.12);

    --danger: #ff6b7a;

    --danger-bg: rgba(255,107,122,0.15);

    --warning: #ffc940;

    --success: #51e88a;

    --shadow-color: rgba(0,0,0,0.4);

    --header-gradient: rgba(30,38,50,0.8);

    --header-gradient-end: rgba(30,38,50,0.7);

    --star-opacity: 0.1;

    --cal-bg: rgba(0,0,0,0.1);

    --cal-day-hover: rgba(255,255,255,0.08);

    --cal-today-bg: rgba(77,201,246,0.2);

    --scrollbar-thumb: rgba(255,255,255,0.15);

    --marker-shadow: rgba(0,0,0,0.3);

    --popup-bg: rgba(30,38,50,0.95);

    --schedule-header-bg: rgba(77,201,246,0.1);

    --schedule-stripe: rgba(77,201,246,0.85);

  }

    --scrollbar-track: transparent;

  }

  [data-theme="light"] {

    --bg-primary: #e8ecf0;

    --bg-panel: rgba(30,38,50,0.75);

    --bg-card: rgba(0,0,0,0.12);

    --bg-card-hover: rgba(0,0,0,0.2);

    --bg-input: rgba(255,255,255,0.1);

    --border-color: rgba(255,255,255,0.08);

    --border-light: rgba(255,255,255,0.05);

    --text-primary: rgba(255,255,255,0.95);

    --text-secondary: rgba(255,255,255,0.7);

    --text-muted: rgba(255,255,255,0.45);

    --text-faint: rgba(255,255,255,0.2);

    --accent: #4dc9f6;

    --accent-bg: rgba(77,201,246,0.12);

    --danger: #ff6b7a;

    --danger-bg: rgba(255,107,122,0.15);

    --warning: #ffc940;

    --success: #51e88a;

    --shadow-color: rgba(0,0,0,0.4);

    --header-gradient: rgba(30,38,50,0.8);

    --header-gradient-end: rgba(30,38,50,0.7);

    --star-opacity: 0.1;

    --cal-bg: rgba(0,0,0,0.1);

    --cal-day-hover: rgba(255,255,255,0.08);

    --cal-today-bg: rgba(77,201,246,0.2);

    --scrollbar-thumb: rgba(255,255,255,0.15);

    --scrollbar-track: transparent;

    --schedule-header-bg: rgba(77,201,246,0.1);

    --schedule-stripe: rgba(77,201,246,0.85);

    --popup-bg: rgba(30,38,50,0.95);

    --marker-shadow: rgba(0,0,0,0.3);

  }



  * { margin: 0; padding: 0; box-sizing: border-box; }



  body {

    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;

    overflow: hidden;

    height: 100vh;

    background: var(--bg-primary);

    transition: background 0.4s ease;

  }



  #mapContainer { width: 100%; height: 100vh; position: relative; z-index: 1; }



  /* ===== Stars ===== */

  .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; opacity:0.6; }

  .star {

    position: absolute; width: 2px; height: 2px; background: var(--text-primary); border-radius: 50%;

    animation: twinkle var(--dur) ease-in-out infinite; opacity: 0;

  }

  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.5)} 50%{opacity:var(--op);transform:scale(1)} }



  /* ===== Header ===== */

  .header {
    position: fixed; top:0; left:0; right:0; z-index:100; padding:12px 24px;
    background: linear-gradient(180deg, rgba(10,14,39,0.96) 0%, rgba(10,14,39,0.88) 70%, rgba(10,14,39,0.4) 100%);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: auto; border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header > * { pointer-events: auto; }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-icon {

    width: 40px; height: 40px;

    background: linear-gradient(135deg, #00d4ff, #7b2ff7);

    border-radius: 12px; display: flex; align-items: center; justify-content: center;

    font-size: 20px; box-shadow: 0 4px 20px var(--accent-bg);

  }

  .logo-text { font-size: 22px; font-weight: 300; letter-spacing: 3px; color: var(--text-primary); }

  .logo-text span {

    font-weight: 700;

    background: linear-gradient(135deg, #00d4ff, #7b2ff7);

    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

  }



  .stats { display: none; }

  .stat-value.upcoming {

    background: linear-gradient(135deg, #ffd700, #ffaa00);

    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

  }

  .stat-value.project {

    background: linear-gradient(135deg, #ff4757, #ff6b81);

    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

  }

  .stat-label { font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; margin-top: 4px; }



  /* ===== Mode Switch ===== */

  .mode-switch {

    display: flex; background: var(--bg-panel); backdrop-filter: blur(20px);

    border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden;

  }

  .mode-btn {

    padding: 10px 18px; border: none; background: transparent; color: var(--text-secondary);

    font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;

    transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;

    position: relative;

  }

  .mode-btn.active-visited {

    background: var(--accent-bg); color: #00d4ff;

    box-shadow: inset 0 -2px 0 #00d4ff;

  }



  .mode-btn.active-upcoming {

    background: rgba(255,215,0,0.15); color: #ffd700;

    box-shadow: inset 0 -2px 0 #ffd700;

  }

  .mode-btn.active-project {

    background: rgba(255,71,87,0.15); color: #ff4757;

    box-shadow: inset 0 -2px 0 #ff4757;

  }

  .mode-btn:hover:not(.active-visited):not(.active-upcoming):not(.active-project) { color: var(--text-primary); }



  /* ===== Map Type Switch ===== */

  .map-type-switch {

    position: fixed; bottom: 30px; right: 30px; z-index: 100;

    display: flex; background: var(--bg-panel); backdrop-filter: blur(20px);

    border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;

  }

  .map-type-btn {

    padding: 8px 14px; border: none; background: transparent; color: var(--text-secondary);

    font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit;

    transition: all 0.3s ease; display: flex; align-items: center; gap: 6px;

  }

  .map-type-btn.active {

    background: var(--accent-bg); color: #00d4ff;

  }

  .map-type-btn:hover:not(.active) { color: var(--text-primary); }



  /* ===== Left Panel (Search + Itinerary) ===== */

  .left-panel {

    position: fixed; top: 80px; left: 20px; z-index: 100; width: 720px;

    height: calc(100vh - 100px);

    display: flex; flex-direction: column;

    background: var(--bg-panel); backdrop-filter: blur(20px);

    border: 1px solid var(--border-color); border-radius: 16px;

    overflow: hidden;

  }



  /* Tabs */

  .panel-tabs {

    display: flex; border-bottom: 1px solid var(--bg-card-hover);

  }

  .panel-tab {

    flex: 1; padding: 14px; border: none; background: transparent;

    color: var(--text-secondary); font-size: 13px; font-weight: 500;

    cursor: pointer; font-family: inherit; transition: all 0.3s ease;

    display: flex; align-items: center; justify-content: center; gap: 6px;

  }

  .panel-tab.active {

    color: #00d4ff;

    background: var(--accent-bg);

    box-shadow: inset 0 -2px 0 #00d4ff;

  }

  .panel-tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-card); }



  /* Tab Content */

  .tab-content { display: none; padding: 16px; overflow-y: auto; }

  .tab-content.active { display: block; }



  /* Search Section */

  .search-section {

    border: 1px solid var(--border-color);

    border-radius: 12px;

    margin-bottom: 16px;

    overflow: hidden;

  }

  .search-section-header {

    display: flex;

    align-items: center;

    justify-content: space-between;

    padding: 12px 16px;

    background: var(--accent-bg);

    cursor: pointer;

    transition: all 0.2s ease;

  }

  .search-section-header:hover {

    background: var(--accent-bg);

  }

  .search-section-title {

    font-size: 13px;

    font-weight: 600;

    color: #00d4ff;

  }

  .search-section-toggle {

    font-size: 10px;

    color: var(--text-secondary);

    transition: transform 0.3s ease;

  }

  .search-section-header.collapsed .search-section-toggle {

    transform: rotate(-90deg);

  }

  .search-section-content {

    padding: 12px;

    background: var(--bg-panel);

  }

  .search-section-content.collapsed {

    display: none;

  }

  .search-box { display: flex; gap: 8px; }

  .search-input-wrap { flex: 1; position: relative; }

  .search-input-wrap svg { position: absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; fill:var(--text-muted); }

  .search-input {

    width: 100%; padding: 12px 16px 12px 42px;

    background: var(--bg-card-hover);

    border: 1px solid var(--border-color); border-radius: 12px;

    color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; transition: all 0.3s ease;

  }

  .search-input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 20px var(--accent-bg); }

  .search-input::placeholder { color: var(--text-faint); }

  .search-btn {

    padding: 12px 20px; border: none; border-radius: 12px; color: var(--text-primary);

    font-size: 14px; font-weight: 600; cursor: pointer;

    font-family: inherit; transition: all 0.3s ease;

    background: linear-gradient(135deg, #00d4ff, #7b2ff7);

    box-shadow: 0 4px 20px var(--accent-bg);

  }

  .search-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(0,212,255,0.4); }



  .search-results {

    max-height: 280px; overflow-y: auto;

    background: var(--header-gradient);

    border: 1px solid var(--bg-card-hover); border-radius: 12px;

    display: none;

    margin-top: 10px;

    z-index: 200;

  }

  .search-results.show { display: block; }

  .search-result-item {

    padding: 12px 14px; border-bottom: 1px solid var(--bg-card);

    cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 10px;

  }

  .search-result-item:hover { background: var(--bg-card); }

  .search-result-item:last-child { border-bottom: none; }

  .result-icon {

    width: 28px; height: 28px; border-radius: 6px; display: flex;

    align-items: center; justify-content: center; font-size: 12px;

    background: var(--bg-card-hover);

  }

  .result-info { flex: 1; min-width: 0; }

  .result-name { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .result-addr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .result-add-btn {

    padding: 6px 12px; border: none; border-radius: 6px;

    background: linear-gradient(135deg, #00d4ff, #7b2ff7);

    color: var(--text-primary); font-size: 11px; font-weight: 600; cursor: pointer;

    transition: all 0.2s; white-space: nowrap;

  }

  .result-add-btn:hover { transform: scale(1.05); }

  .result-add-btn.added { background: var(--border-color); color: var(--text-secondary); cursor: default; }



  /* Destinations Section */

  .destinations-section {

    margin-top: 16px;

    padding-top: 16px;

    border-top: 1px solid var(--bg-card-hover);

  }

  .destinations-header {

    display: flex;

    align-items: center;

    justify-content: space-between;

    margin-bottom: 12px;

  }

  .destinations-title {

    font-size: 13px;

    font-weight: 600;

    color: var(--text-primary);

  }

  .destinations-count {

    font-size: 11px;

    color: var(--text-secondary);

    background: var(--bg-card-hover);

    padding: 2px 8px;

    border-radius: 10px;

  }

  .destinations-list {

    display: flex;

    flex-wrap: wrap;

    gap: 8px;

  }

  .destination-tag {

    display: inline-flex;

    align-items: center;

    gap: 4px;

    padding: 6px 12px;

    background: var(--bg-card-hover);

    border: 1px solid var(--border-color);

    border-radius: 20px;

    font-size: 12px;

    color: var(--text-primary);

    cursor: pointer;

    transition: all 0.2s;

  }

  .destination-tag:hover {

    background: var(--accent-bg);

    border-color: var(--accent-bg);

    color: #00d4ff;

  }

  .destination-tag .type-icon {

    font-size: 10px;

  }

  .empty-destinations {

    padding: 20px;

    text-align: center;

    color: var(--text-muted);

    font-size: 12px;

  }



  /* ===== Calendar Styles - 苹果日历风格 ===== */

  .calendar-section {

    background: var(--bg-panel);

    border: 1px solid var(--bg-card-hover);

    border-radius: 12px;

    padding: 12px;

    margin-bottom: 16px;

  }

  .calendar-header {

    display: flex;

    align-items: center;

    justify-content: space-between;

    margin-bottom: 12px;

    padding: 0 4px;

  }

  .calendar-nav {

    display: flex;

    align-items: center;

    gap: 8px;

  }

  .nav-btn {

    width: 24px;

    height: 24px;

    border: none;

    border-radius: 6px;

    background: var(--bg-card-hover);

    color: var(--text-primary);

    font-size: 12px;

    cursor: pointer;

    transition: all 0.2s;

    display: flex;

    align-items: center;

    justify-content: center;

  }

  .nav-btn:hover {

    background: var(--border-color);

    color: var(--text-primary);

  }

  .month-label {

    font-size: 15px;

    font-weight: 600;

    color: var(--text-primary);

    min-width: 100px;

    text-align: center;

  }

  .today-btn {

    padding: 4px 10px;

    border: none;

    border-radius: 6px;

    background: var(--accent-bg);

    color: #00d4ff;

    font-size: 12px;

    font-weight: 500;

    cursor: pointer;

    transition: all 0.2s;

  }

  .today-btn:hover {

    background: rgba(0,212,255,0.25);

  }

  .weekday-row {

    display: grid;

    grid-template-columns: repeat(7, 1fr);

    gap: 2px;

    margin-bottom: 4px;

    padding: 4px 0;

    padding: 0 4px;

  }

  .weekday-row span {

    text-align: center;

    font-size: 10px;

    color: var(--text-muted);

    font-weight: 500;

    text-transform: uppercase;

    letter-spacing: 0.5px;

  }

  .calendar-list {

    display: grid;

    grid-template-rows: repeat(auto-fill, 1fr);

    gap: 2px;

  }

  .calendar-week {

    display: grid;

    grid-template-columns: repeat(7, 1fr);

    gap: 3px;

  }

  .calendar-day {
    height: 110px;
    padding: 3px 4px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; flex-direction: column; gap: 0;
    background: var(--bg-card); overflow: hidden; box-sizing: border-box;
    border: 1px solid transparent;
  }
  .calendar-day:hover {
    background: var(--bg-card-hover);
    border-color: rgba(255,255,255,0.08);
    transform: translateY(-1px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .calendar-day.other-month { opacity: 0.22; }
  .calendar-day.today {
    background: rgba(0,212,255,0.14);
    border-color: rgba(0,212,255,0.3);
    box-shadow: 0 0 16px rgba(0,212,255,0.08);
  }

  .calendar-day.today .day-number {

    color: #00d4ff;

    font-weight: 700;

  }

  .calendar-day.selected {

    background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(123,47,247,0.3)));

    border: 1px solid rgba(0,212,255,0.4);

  }

  .calendar-day.has-events {

    border: 1px solid var(--accent-bg);

    box-shadow: 0 0 8px var(--accent-bg);

    background: rgba(0,212,255,0.06);

  }

  .calendar-day.has-events:hover {

    border: 1px solid rgba(0,212,255,0.6);

    box-shadow: 0 0 12px rgba(0,212,255,0.25);

    background: var(--accent-bg);

  }

  .day-number {

    font-size: 16px;

    color: var(--text-primary);

    font-weight: 700;

    text-align: center;

    line-height: 1;

  }

  .day-events {

    display: flex;

    flex-direction: column;

    gap: 1px;

    margin-top: 2px;

    flex: 1;

    overflow: hidden;

    min-height: 0;

  }

  .day-event {

    font-size: 9px;

    padding: 0 3px;

    border-radius: 3px;

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

    line-height: 1.4;

    flex-shrink: 0;

    display: flex;

    align-items: center;

    gap: 2px;

  }

  .day-event-dot {

    width: 6px;

    height: 6px;

    border-radius: 50%;

    flex-shrink: 0;

  }

  .day-event.c0 { background: rgba(59,130,246,0.3); color: #93c5fd; }

  .day-event.c1 { background: rgba(168,85,247,0.3); color: #d8b4fe; }

  .day-event.c2 { background: rgba(245,158,11,0.3); color: #fcd34d; }

  .day-event.c3 { background: rgba(34,197,94,0.3); color: #86efac; }

  .day-event.c4 { background: rgba(239,68,68,0.3); color: #fca5a5; }

  .day-event.c5 { background: rgba(14,165,233,0.3); color: #7dd3fc; }

  .day-event.c6 { background: rgba(236,72,153,0.3); color: #f9a8d4; }

  .day-event.c7 { background: rgba(20,184,166,0.3); color: #5eead4; }

  .day-event.c8 { background: rgba(249,115,22,0.3); color: #fdba74; }

  .day-event.c9 { background: rgba(99,102,241,0.3); color: #a5b4fc; }

  .day-event.c10 { background: rgba(132,204,22,0.3); color: #bef264; }

  .day-event.c11 { background: rgba(225,29,72,0.3); color: #fda4af; }

  .calendar-sync-item {

    border-left: 2px solid rgba(123,47,247,0.3));

  }

  .day-event.more {

    background: transparent;

    color: var(--text-secondary);

    font-size: 9px;

    text-align: center;

    padding: 2px;

  }

  .day-event.done {

    opacity: 0.35;

    text-decoration: line-through;

  }

  .day-plan-dot {

    width: 5px;

    height: 5px;

    border-radius: 50%;

    background: #00ff88;

    margin: 2px auto 0;

  }

  .calendar-day.selected .day-number {

    color: var(--text-primary);

  }

  .day-color-bar {

    display: flex;

    gap: 2px;

    justify-content: center;

    padding: 1px 4px 2px;

    flex-shrink: 0;

  }

  .day-color-dot {

    width: 14px;

    height: 3px;

    border-radius: 2px;

    flex-shrink: 0;

    opacity: 0.95;

  }

  .calendar-day.other-month .day-color-dot {

    opacity: 0.5;

  }

  .plan-content {

  .plan-title {

  .th-seq { width: 40px; text-align: center; }

  .th-person { width: 75px; }

  .th-connector { width: 70px; }

  .th-time { width: 90px; }

  .th-action { width: 65px; text-align: center; }

  .td-content:hover { color: #00d4ff; }

  .td-person { color: #00d4ff; font-size: 12px; width: 70px; }

  .td-connector { color: #a78bfa; font-size: 12px; width: 65px; }

  .td-action { width: 50px; text-align: center; }

  .td-action button {

  .footprint-list {

    gap: 6px; padding: 8px 12px;

  .footprint-list-section {

    gap: 6px;

  }

  .expand-more-btn {

    padding: 8px;

    font-size: 11px;

    border: 1px dashed var(--border-color);

  /* Section headers */

  .list-section-title {

    font-size: 11px; font-weight: 600; letter-spacing: 2px; padding: 10px 12px 8px;

    display: flex; align-items: center; gap: 6px;

    cursor: pointer; user-select: none; border-radius: 10px;

    transition: all 0.2s ease;

    background: var(--bg-card);

  }

  .list-section-title:hover { background: var(--bg-card-hover); border-color: var(--border-color); }

  .list-section-title.visited-title { color: rgba(0,212,255,0.5); }



  .list-section-title.upcoming-title { color: rgba(255,215,0,0.5); }

  .list-section-title.project-title { color: rgba(255,71,87,0.6); }

  .list-section-title .section-count {

    transition: transform 0.3s ease, opacity 0.2s;

  }

  .list-section-title:hover .collapse-icon { opacity: 0.6; }

  .list-section-title.collapsed .collapse-icon {

    transform: rotate(-90deg);

  }

  .visited-title .section-count { background: var(--accent-bg); }



  .upcoming-title .section-count { background: rgba(255,215,0,0.1); color: rgba(255,215,0,0.8); }

  .project-title .section-count { background: rgba(255,71,87,0.15); color: rgba(255,71,87,0.8); }

  .visibility-toggle {

    margin-left: auto; margin-right: 6px; font-size: 11px; opacity: 0.3;

    cursor: pointer; transition: opacity 0.2s; padding: 2px 4px; border-radius: 4px;

    background: none; border: none; line-height: 1;

  .visibility-toggle:hover { opacity: 0.7; }

  .footprint-card {

    padding: 14px 16px; background: var(--bg-panel); backdrop-filter: blur(20px);

    border: 1px solid var(--bg-card-hover); border-radius: 12px; cursor: pointer;

    transition: all 0.3s ease; position: relative; overflow: hidden;

  .footprint-card.visited-card::after {

    content: ''; position: absolute; top:0; left:0; width:3px; height:100%;

  }

  .footprint-card.project-card::after {

    content: ''; position: absolute; top:0; left:0; width:3px; height:100%;

  .footprint-card.visited-card:hover { transform: translateX(-4px); border-color: var(--accent-bg); box-shadow: 0 4px 30px var(--accent-bg); }



  .footprint-card.upcoming-card:hover { transform: translateX(-4px); border-color: rgba(255,215,0,0.2); box-shadow: 0 4px 30px rgba(255,215,0,0.1); }

  .footprint-card.project-card:hover { transform: translateX(-4px); border-color: rgba(255,71,87,0.3); box-shadow: 0 4px 30px rgba(255,71,87,0.15); }



  .fp-header { display: flex; align-items: center; justify-content: space-between; }

  .fp-index { font-size: 10px; font-weight: 700; }

  .fp-index.visited-idx { color: rgba(0,212,255,0.5); }



  .fp-index.upcoming-idx { color: rgba(255,215,0,0.5); }

  .fp-index.project-idx { color: rgba(255,71,87,0.5); }

  .fp-badge {

    font-size: 9px; padding: 2px 7px; border-radius: 6px; font-weight: 600; letter-spacing: 1px;

  }

  .fp-badge.visited-badge { background: rgba(0,212,255,0.12); color: rgba(0,212,255,0.7); }



  .fp-badge.upcoming-badge { background: rgba(255,215,0,0.12); color: rgba(255,215,0,0.7); }

  .fp-badge.project-badge { background: rgba(255,71,87,0.15); color: rgba(255,71,87,0.9); }

  .fp-actions { display: flex; gap: 4px; }

  .fp-action-btn {

    width: 24px; height: 24px; background: none; border: none;

    color: var(--text-secondary); cursor: pointer; border-radius: 6px;

    display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s;

  }

  .fp-action-btn:hover { color: #ff6b6b; background: var(--danger-bg); }

  .fp-action-btn.convert-btn:hover { color: #00ff88; background: rgba(0,255,136,0.1); }

  .fp-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 4px; }

  .fp-addr { font-size: 11px; color: var(--text-muted); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .fp-time { font-size: 11px; margin-top: 6px; }

  .fp-time.visited-time { color: rgba(0,212,255,0.4); }



  .fp-time.upcoming-time { color: rgba(255,215,0,0.4); }

  .fp-time.project-time { color: rgba(255,71,87,0.4); }

    color: rgba(0,212,255,0.7);

    color: rgba(255,215,0,0.7);

  }

  .fp-unlocked.project-unlocked {

    background: var(--danger-bg);

  /* ===== Leaflet Custom Popup ===== */

  /* ===== Custom Markers with Labels ===== */

  .custom-marker { width: auto; height: auto; position: relative; display: flex; flex-direction: column; align-items: center; }

    transform: translateX(-50%); animation: markerPulse 2s ease-out infinite;

  .marker-ring.visited-ring { border: 2px solid rgba(0,212,255,0.4); }



  .marker-ring.upcoming-ring { border: 2px solid rgba(255,215,0,0.4); }

  .marker-ring.project-ring { border: 2px solid rgba(255,71,87,0.5); animation: projectPulse1 1.5s ease-out infinite; }

  .marker-ring2 {

    width: 30px; height: 30px; border-radius: 50%; position: absolute; top: 7px; left: 50%;

    transform: translateX(-50%); animation: markerPulse 2s 0.5s ease-out infinite;

  }

  .marker-ring2.visited-ring2 { border: 1px solid rgba(123,47,247,0.3)); }



  .marker-ring2.upcoming-ring2 { border: 1px solid rgba(255,170,0,0.3); }

  .marker-ring2.project-ring2 { border: 1px solid rgba(255,107,129,0.3); animation: projectPulse2 1.5s 0.5s ease-out infinite; }



  .marker-label {

    position: absolute;

    top: 20px;

    left: 50%;

    border-radius: 5px;

    display: flex;

    align-items: center;

    gap: 6px;

  }

  .marker-label .label-city { font-weight: 600; }

  .marker-label .label-person {

    font-size: 10px;

    font-weight: 500;

    color: rgba(255,255,255,0.7);

    background: rgba(255,255,255,0.1);

    padding: 1px 5px;

    border-radius: 3px;

  }

  .marker-label.visited-label { color: #00d4ff; border-color: rgba(0,212,255,0.3); }



  .marker-label.upcoming-label { color: #ffd700; border-color: rgba(255,215,0,0.3); }

  .marker-label.project-label { color: #ff4757; border-color: rgba(255,71,87,0.4); text-shadow: 0 0 8px rgba(255,71,87,0.5); }

  .marker-date {

    position: absolute;

    top: 38px;

    left: 50%;

    transform: translateX(-50%);

    white-space: nowrap;

    font-size: 10px;

    font-weight: 500;

    padding: 1px 6px;

    border-radius: 3px;

    background: rgba(0,0,0,0.5);

    backdrop-filter: blur(4px);

    color: rgba(255,255,255,0.6);

    z-index: 10;

    pointer-events: none;

  }

  .marker-date.upcoming-date { color: rgba(255,215,0,0.9); }

  .marker-date.project-date { color: rgba(255,71,87,0.9); }

  .marker-person {

    position: absolute;

    top: 38px;

    left: 50%;

    transform: translateX(-50%);

    white-space: nowrap;

    font-size: 10px;

    font-weight: 600;

    padding: 1px 6px;

    border-radius: 4px;

    background: rgba(0,0,0,0.6);

    backdrop-filter: blur(4px);

    color: rgba(255,255,255,0.8);

    z-index: 10;

    pointer-events: none;

  }

  .marker-person.upcoming-date { color: rgba(255,215,0,0.7); }

  .marker-person.project-date { color: rgba(255,71,87,0.7); }





  .upcoming-icon-marker {

    position: absolute; top: 0; left: 50%; transform: translateX(-50%);

    font-size: 16px; z-index: 3; animation: rocketBounce 1.5s ease-in-out infinite;

  }

  @keyframes rocketBounce {

    0%,100% { transform: translateX(-50%) translateY(0); }

    50% { transform: translateX(-50%) translateY(-3px); }

  }

  .project-icon-marker {

    position: absolute; top: 0; left: 50%; transform: translateX(-50%);

    font-size: 16px; z-index: 3; animation: projectGlow 1.2s ease-in-out infinite alternate;

  }

  @keyframes projectGlow {

    0% { transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 6px rgba(255,71,87,0.7)); }

    100% { transform: translateX(-50%) scale(1.25); filter: drop-shadow(0 0 14px rgba(255,71,87,1)); }

  }

  @keyframes projectPulse1 { 0%{transform:translateX(-50%) scale(1);opacity:0.7} 100%{transform:translateX(-50%) scale(3);opacity:0} }

  @keyframes projectPulse2 { 0%{transform:translateX(-50%) scale(1);opacity:0.5} 100%{transform:translateX(-50%) scale(2.5);opacity:0} }

  @keyframes markerPulse { 0%{transform:translateX(-50%) scale(1);opacity:1} 100%{transform:translateX(-50%) scale(2.5);opacity:0} }



  /* ===== Toast ===== */

  .toast {

    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); z-index: 9999;

    padding: 12px 24px; background: var(--header-gradient); backdrop-filter: blur(20px);

    border-radius: 12px; color: var(--text-primary); font-size: 14px; opacity: 0; transition: all 0.4s ease;

    pointer-events: none; white-space: nowrap;

  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .toast.success { border: 1px solid rgba(0,255,136,0.3); }

  .toast.error { border: 1px solid var(--danger-bg); }

  .toast.upcoming { border: 1px solid rgba(255,215,0,0.3); }

  .toast.project { border: 1px solid rgba(255,71,87,0.4); }



  /* ===== Modal ===== */

  .modal-overlay {

    position: fixed; inset: 0; z-index: 10000;

    background: var(--shadow-color); backdrop-filter: blur(5px);

    display: none; align-items: center; justify-content: center;

  }

  .modal-overlay.show { display: flex; }

  .modal {

    width: 400px; max-width: 90vw;

    background: var(--header-gradient); backdrop-filter: blur(20px);

    border: 1px solid var(--border-color); border-radius: 20px;

    padding: 24px;

  }

  .modal-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }

  .form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }

  .form-input, .form-select {

    width: 100%; padding: 12px 16px;

    background: #1a1f3a;

    border: 1px solid var(--border-color); border-radius: 10px;

    color: var(--text-primary); font-size: 14px; font-family: inherit;

    outline: none; transition: all 0.3s;

  }

  .form-input:focus, .form-select:focus { border-color: rgba(0,212,255,0.4); }

  .form-input::placeholder { color: var(--text-faint); }

  .form-select option { background: #1a1f3a; color: var(--text-primary); }

  .color-picker-row {

    display: flex; gap: 8px; padding: 4px 0; flex-wrap: wrap;

  }

  .color-dot {

    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;

    border: 2px solid transparent; transition: all 0.15s;

    box-shadow: 0 1px 4px var(--shadow-color);

  }

  .color-dot:hover { transform: scale(1.15); }

  .color-dot.selected {

    border-color: var(--text-primary); transform: scale(1.2);

    box-shadow: 0 0 0 2px var(--text-muted);

  }

  .form-actions { display: flex; gap: 12px; margin-top: 24px; }

  .form-btn {

    flex: 1; padding: 12px; border: none; border-radius: 10px;

    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;

  }

  .form-btn.primary {

    background: linear-gradient(135deg, #00d4ff, #7b2ff7);

    color: var(--text-primary);

  }

  .form-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--accent-bg); }

  .form-btn.secondary {

    background: var(--bg-card-hover); color: var(--text-primary);

  }

  .form-btn.secondary:hover { background: var(--border-color); }



  /* Cloud Sync Modal Styles */

  .sync-tabs {

    display: flex;

    gap: 8px;

    margin-bottom: 20px;

    border-bottom: 1px solid var(--border-color);

    padding-bottom: 12px;

  }

  .sync-tab {

    flex: 1;

    padding: 10px;

    border: none;

    border-radius: 8px;

    background: var(--bg-card-hover);

    color: var(--text-secondary);

    font-size: 13px;

    cursor: pointer;

    transition: all 0.2s;

  }

  .sync-tab.active {

    background: var(--accent-bg);

    color: #00d4ff;

  }

  .sync-tab:hover:not(.active) {

    background: var(--border-color);

  }

  .sync-content {

    display: none;

  }

  .sync-content.active {

    display: block;

  }

  .sync-info {

    background: var(--accent-bg);

    border: 1px solid var(--accent-bg);

    border-radius: 10px;

    padding: 12px 16px;

    margin-bottom: 20px;

  }

  .sync-info p {

    font-size: 12px;

    color: var(--text-primary);

    margin: 4px 0;

    line-height: 1.5;

  }



  ::-webkit-scrollbar { width: 4px; }

  ::-webkit-scrollbar-track { background: transparent; }

  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }



  .loading-overlay {

    position: fixed; inset: 0; background: var(--bg-primary); z-index: 99999;

    display: flex; flex-direction: column; align-items: center; justify-content: center;

    transition: opacity 0.8s ease, visibility 0.8s ease;

  }

  .loading-overlay.hidden { opacity: 0; visibility: hidden; }

  .loading-spinner { width: 50px; height: 50px; border: 3px solid transparent; border-top-color: #00d4ff; border-right-color: #7b2ff7; border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { margin-top: 20px; font-size: 14px; letter-spacing: 6px; color: var(--text-secondary); animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }



  /* Leaflet Dark Theme Overrides */

  .leaflet-container {

    background: var(--bg-primary) !important;

    cursor: default !important;

  }

  .leaflet-container:active {

    cursor: default !important;

  }

  .leaflet-grab {

    cursor: default !important;

  }

  .leaflet-grab:active {

    cursor: default !important;

  }

  .leaflet-control-attribution {

    background: var(--bg-panel) !important;

    color: var(--text-secondary) !important;

  }

  .leaflet-control-attribution a {

    color: var(--text-secondary) !important;

  }

  

  /* 暗色地图滤镜 */

  .dark-map .leaflet-tile-pane {

    filter: brightness(0.5) contrast(1.1) saturate(0.6);

  }


  /* ===== Mobile Responsive ===== */
  @media (max-width: 768px) {
    /* Header */
    .header { padding: 10px 16px; }
    .logo-icon { width: 32px; height: 32px; font-size: 16px; border-radius: 8px; }
    .logo-text { font-size: 16px; letter-spacing: 1px; }
    .stats { display: none !important; }

    /* Left panel - full width overlay */
    .left-panel {
      position: fixed;
      top: 56px; left: 0; right: 0;
      width: 100% !important;
      height: calc(100vh - 56px);
      border-radius: 0;
      z-index: 200;
      display: none;
    }
    .left-panel.mobile-show { display: flex; }

    /* Right panel - full width overlay */
    .footprint-panel {
      position: fixed;
      top: 56px; left: 0; right: 0;
      width: 100% !important;
      max-height: calc(100vh - 56px);
      border-radius: 0;
      z-index: 200;
      display: none;
    }
    .footprint-panel.mobile-show { display: flex; }

    /* Calendar cells smaller on mobile */
    .calendar-day { height: 56px; min-height: 56px; }
    .day-number { font-size: 12px; }
    .calendar-section { padding: 8px; max-height: calc(100vh - 130px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .calendar-header { margin-bottom: 6px; }
    .month-label { font-size: 13px; min-width: 80px; }
    .weekday-row span { font-size: 10px; }

    /* Search section */
    .search-section { border-radius: 8px; margin-bottom: 8px; }
    .search-input { padding: 10px 14px 10px 38px; font-size: 13px; }
    .search-btn { padding: 10px 14px; font-size: 13px; }

    /* Schedule table - scroll horizontal */
    .schedule-table-wrap { padding: 6px; }
    .schedule-table { font-size: 11px; min-width: 500px; }
    .th-seq, .td-seq { width: 32px; min-width: 32px; }
    .th-content, .td-content { min-width: 60px; max-width: 100px; }
    .th-person, .td-person { min-width: 50px; max-width: 60px; }
    .th-connector, .td-connector { min-width: 50px; max-width: 60px; }
    .th-time, .td-time { min-width: 70px; max-width: 90px; }

    /* Map type switch - bottom center above nav */
    .map-type-switch {
      position: fixed;
      bottom: 72px;
      right: 12px;
      border-radius: 10px;
    }
    .map-type-btn { padding: 6px 10px; font-size: 11px; }

    /* Modals */
    .modal { max-width: 95vw; padding: 18px; border-radius: 16px; }
    .modal-title { font-size: 16px; margin-bottom: 14px; }
    .form-input, .form-select { padding: 10px 14px; font-size: 15px; border-radius: 8px; }

    /* Toast */
    .toast { top: 60px; font-size: 12px; padding: 10px 18px; }

    /* Bottom navigation bar */
    .mobile-nav {
      display: flex !important;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 58px;
      background: rgba(8,12,32,0.96);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 999;
      justify-content: space-around;
      align-items: center;
      padding: 0 4px;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .mobile-nav-item {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; flex: 1; height: 100%;
      border: none; background: transparent;
      color: rgba(255,255,255,0.4); font-size: 10px; font-family: inherit;
      cursor: pointer; transition: all 0.2s ease; padding: 4px 0;
      position: relative;
    }
    .mobile-nav-item.active { color: #00d4ff; }
    .mobile-nav-item.active::before {
      content: '';
      position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 3px; border-radius: 3px; background: #00d4ff;
    }
    .mobile-nav-icon {
      font-size: 20px;
      line-height: 1;
    }
    .mobile-nav-label {
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Leaflet controls on mobile */
    .leaflet-control-zoom { margin-bottom: 70px !important; }
    .leaflet-bottom { bottom: 60px; }

    /* Panel slide animation */
    .left-panel, .footprint-panel {
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Day detail section */
    .day-detail-section { padding: 10px; margin-top: 8px; border-radius: 10px; }

    /* Panel top tabs */
    .panel-top-tabs { background: rgba(0,0,0,0.3); }
    .top-tab { padding: 10px 0; font-size: 12px; }
  }

  /* ===== Desktop: hide mobile nav ===== */
  .mobile-nav { display: none; }

  /* ===== Visual Polish ===== */
  /* Smooth panel transitions */
  .left-panel, .footprint-panel {
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  /* Calendar day hover ripple */
  .calendar-day { transition: all 0.15s ease; }
  .calendar-day:active { transform: scale(0.95); }

  /* Button press feedback */
  .toolbar-btn:active, .nav-btn:active, .map-type-btn:active, .mode-btn:active {
    transform: scale(0.95);
    opacity: 0.8;
  }

  /* Search result item touch */
  .search-result-item { transition: background 0.1s ease; }
  .search-result-item:active { background: var(--bg-card-hover); }

  /* Smooth modal */
  .modal-overlay.show { animation: fadeIn 0.15s ease; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

</style>

</head>

<body>



<div class="loading-overlay" id="loading">

  <div class="loading-spinner"></div>

  <div class="loading-text">LOADING MAP</div>

</div>



<div class="stars" id="stars"></div>



<!-- Header -->

<div class="header">

  <div class="logo">

    <div class="logo-icon">🗺️</div>

    <div class="logo-text">超大人<span>项目规划</span></div>

  </div>

  <div class="stats">

    <div class="stat-item">

      <div class="stat-value visited" id="visitedCount">0</div>

      <div class="stat-label">已去过</div>

    </div>

    <div class="stat-item">



    </div>

    <div class="stat-item">

      <div class="stat-value upcoming" id="upcomingCount">0</div>

      <div class="stat-label">CGC项目</div>

    </div>

    <div class="stat-item">

      <div class="stat-value project" id="projectCount">0</div>

      <div class="stat-label">近期项目</div>

    </div>

  </div>

  <div style="display:flex;gap:6px;align-items:center;">

    <button class="toolbar-btn" title="导出数据" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;padding:4px 10px;" onclick="exportData()">📤</button>

    <button class="toolbar-btn" title="导入数据" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;padding:4px 10px;" onclick="document.getElementById('importFileInput').click()">📥</button>

    <span id="syncIndicator" style="font-size:12px;color:#00ff88;margin:0 6px;cursor:pointer;white-space:nowrap;" onclick="cloudLoadFootprints()" title="点击手动同步">☁️ 同步</span>

    <button class="toolbar-btn" id="fullscreenBtn" title="全屏" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;padding:4px 10px;">⛶</button>

    <button class="toolbar-btn" id="themeToggleBtn" title="切换亮/暗主题" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:14px;padding:4px 10px;">🌙</button>

  </div>

</div>



<!-- Mode Switch (hidden by default) -->

<div id="modeSwitchContainer" style="display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;">

  <div class="mode-switch">

    <button class="mode-btn active-visited" id="modeVisited" onclick="switchMode('visited')">已去过</button>

    <button class="mode-btn" id="modeUpcoming" onclick="switchMode('upcoming')">CGC项目</button>

    <button class="mode-btn" id="modeProject" onclick="switchMode('project')">近期项目</button>

  </div>

</div>



<!-- Left Panel - 合并搜索和行程 -->

<div class="left-panel">

  <!-- Search Section -->

  <div class="search-section">

    <div class="search-box">

      <div class="search-input-wrap">

        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

        <input type="text" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;" tabindex="-1" aria-hidden="true" autocomplete="off">
        <input type="search" class="search-input" id="searchInput" placeholder="搜索地点，如：北京故宫" autocomplete="off" spellcheck="false">

      </div>

      <button class="search-btn" id="searchBtn">搜索</button>

    </div>

    <div class="search-results" id="searchResults"></div>

  </div>



  <!-- Calendar Section - 苹果日历风格 -->

  <div class="calendar-section">

    <div class="calendar-header">

      <div class="calendar-nav">

        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>

        <span class="month-label" id="monthLabel">2026年4月</span>

        <button class="nav-btn" onclick="changeMonth(1)">›</button>

      </div>

      <button class="today-btn" onclick="goToToday()">今天</button>

    </div>

    <div class="weekday-row">

      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>

    </div>

    <div class="calendar-list" id="calendarList">

      <!-- 动态生成日历 -->

    </div>

  </div>



  <!-- Selected Day Detail -->

  <div class="day-detail-section" id="dayDetailSection" style="display:none;">

    <div class="day-detail-header">

      <span class="day-detail-date" id="selectedDateDetail">4月8日 行程</span>

      <button class="add-plan-btn" onclick="openPlanModal()">+ 添加</button>

    </div>

    <div class="day-detail-list" id="dayDetailList" onwheel="this.scrollTop += event.deltaY">

      <!-- 动态生成当天行程 -->

    </div>

  </div>

</div>



<!-- Footprint Panel -->

<div class="footprint-panel">

  <!-- Top tabs -->

  <div class="panel-top-tabs">

    <button class="top-tab active" id="tabSchedule" onclick="switchPanelTab('schedule')">📋 项目安排</button>

    <button class="top-tab" id="tabFootprints" onclick="switchPanelTab('footprints')">📍 我的足迹</button>

  </div>



  <!-- Tab: 项目安排 (默认显示) -->

  <div class="panel-content" id="panelSchedule" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">

    <div class="panel-toolbar">

      <div style="display:flex;gap:6px;flex:1;flex-wrap:wrap;align-items:center;">

        <button class="toolbar-btn" onclick="openScheduleAddModal()">➕ 添加</button>

      </div>

      <div class="schedule-month-label" id="scheduleMonthLabel"></div>

    </div>

    <div class="schedule-table-wrap">

      <table class="schedule-table">

        <thead>

          <tr><th class="th-seq">序号</th><th class="th-content">内容</th><th class="th-person">负责人</th><th class="th-connector">对接人</th><th class="th-time">时间</th><th class="th-action">操作</th></tr>

        </thead>

        <tbody id="scheduleTableBody"></tbody>

      </table>

    </div>

  </div>



  <!-- Tab: 我的足迹 -->

  <div class="panel-content" id="panelFootprints" style="display:none;flex-direction:column;flex:1;overflow:hidden;">

    <div class="footprint-list" id="footprintList"></div>

  </div>

</div>

<input type="file" id="importFileInput" accept=".json" style="display:none">



<!-- Schedule Item Modal -->

<div class="modal-overlay" id="scheduleItemModal">

  <div class="modal" style="max-width:400px;">

    <div class="modal-title" id="scheduleItemModalTitle">➕ 添加项目</div>

let map;

let currentMode = 'visited';

let footprints = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

let markers = {};

let activePopup = null;

let currentMonth = new Date();

let selectedDate = new Date();

let itinerary = {};

try { itinerary = JSON.parse(localStorage.getItem(ITINERARY_KEY) || '{}'); } catch(e) { console.warn('itinerary parse error'); }

const DONE_KEY = 'travel_plan_done';

let planDoneSet = new Set();

try { planDoneSet = new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]')); } catch(e) { console.warn('doneSet parse error'); localStorage.removeItem(DONE_KEY); }

let dayDetailExpanded = new Set();

let routeLine = null;

let pendingAddLocation = null;

let currentTileLayer = null;

let mapLayers = {};



// ===== Init =====

function init() {

  createStars();

  // 防止浏览器自动填充搜索框（Gist ID等）
  const si = document.getElementById('searchInput');
  if (si) { si.value = ''; }
  // 用 MutationObserver 持续监控，防止浏览器在init之后又自动填充
  const searchObs = new MutationObserver(() => {
    const s = document.getElementById('searchInput');
    if (s && s.value && s.value.length > 30) s.value = '';
  });
  if (si) searchObs.observe(si, { attributes: true, attributeFilter: ['value'] });
  // 兜底：定时检查（浏览器自动填充有时不触发MutationObserver）
  setInterval(() => {
    const s = document.getElementById('searchInput');
    if (s && s.value.length > 30) s.value = '';
  }, 1000);

  // 恢复用户删除过的日历事件（从localStorage读取，覆盖硬编码默认值）
  const savedCalendar = localStorage.getItem('travel_calendar_v2');
  if (savedCalendar) {
    try {
      const parsed = JSON.parse(savedCalendar);
      // 清空默认数据，用本地保存的版本
      Object.keys(CALENDAR_EVENTS).forEach(k => delete CALENDAR_EVENTS[k]);
      Object.assign(CALENDAR_EVENTS, parsed);
    } catch(e) { /* ignore */ }
  }





  // Initialize Leaflet map with dark theme

  map = L.map('mapContainer', {

    center: [35.8617, 104.1954], // China center

    zoom: 5,

    zoomControl: false,

    doubleClickZoom: false

  });



  // 地图图层配置

  mapLayers = {

    vector: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {

      attribution: '&copy; <a href="https://www.amap.com">高德地图</a>',

      subdomains: '1234',

      maxZoom: 18

    }),

    cycle: L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {

      attribution: '&copy; <a href="https://www.cyclosm.org">CyclOSM</a>',

      maxZoom: 18

    }),

    terrain3d: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Terrain_Base/MapServer/tile/{z}/{y}/{x}', {

      attribution: '&copy; <a href="https://www.esri.com">Esri</a>',

      maxZoom: 18

    }),

    traffic: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {

      attribution: '&copy; <a href="https://www.amap.com">高德地图</a>',

      subdomains: '1234',

      maxZoom: 18

    }),

    clouds: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {

      attribution: '&copy; <a href="https://www.amap.com">高德地图</a>',

      subdomains: '1234',

      maxZoom: 18

    })

  };

  

  // 默认加载矢量图层

  currentTileLayer = mapLayers.vector.addTo(map);

  

  // 添加暗色遮罩层

  L.DomUtil.addClass(map.getContainer(), 'dark-map');



  // Add zoom control to bottom right

  L.control.zoom({ position: 'bottomright' }).addTo(map);



  // Hide loading

  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);



  // Click on map to close popup

  map.on('click', () => {

    if (activePopup) {

      map.closePopup();

      activePopup = null;

    }

  });



  // Double click to add marker - 直接添加，不弹出编辑框

  map.on('dblclick', async (e) => {

    L.DomEvent.stopPropagation(e);

    L.DomEvent.preventDefault(e);

    const { lat, lng } = e.latlng;

    

    // 使用高德逆地理编码获取地址信息

    let name = '新地点';

    let address = `${lng.toFixed(4)}, ${lat.toFixed(4)}`;

    

    try {

      const response = await fetch(`https://restapi.amap.com/v3/geocode/regeo?key=ebb9106d77a6f90d4e06ad9a726755f9&location=${lng.toFixed(6)},${lat.toFixed(6)}&extensions=all`);

      const data = await response.json();

      

      if (data && data.status === '1' && data.regeocode) {

        const regeo = data.regeocode;

        const pois = regeo.pois || [];

        const ac = regeo.addressComponent;

        

        if (pois.length > 0) {

          name = pois[0].name;

        } else {

          name = ac.district || ac.street || ac.township || '新地点';

        }

        

        address = regeo.formatted_address || `${lng.toFixed(4)}, ${lat.toFixed(4)}`;

      }

    } catch (err) {

      console.error('Reverse geocoding error:', err);

    }

    

    // 直接添加足迹，不弹出编辑框

    addFootprintWithReturn(name, address, [lng, lat], currentMode);

  });



  // Event listeners

  document.getElementById('searchBtn').addEventListener('click', doSearch);

  document.getElementById('searchInput').addEventListener('keydown', (e) => {

    if (e.key === 'Enter') doSearch();

    if (e.key === 'Escape') document.getElementById('searchResults').classList.remove('show');

  });

  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);

  document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);



  // Modal close on overlay click

  document.getElementById('planModal').addEventListener('click', (e) => {

    if (e.target.id === 'planModal') closePlanModal();

  });

  document.getElementById('editFootprintModal').addEventListener('click', (e) => {

    if (e.target.id === 'editFootprintModal') closeEditFootprintModal();

  });



  applyTheme(currentTheme);

  renderAllMarkers();

  renderFootprints();

  updateStats();

  renderProjectSchedule();

  applyHiddenTypes();

  renderCalendar();

  renderDayDetail();

  updateItineraryStats();

  

  // 加载用户足迹数据

  loadUserFootprints();

  // 自动从云端同步最新数据
  setTimeout(() => { cloudLoadFootprints(); }, 2000);

}



function createStars() {

  const c = document.getElementById('stars');

  for (let i = 0; i < 150; i++) {

    const s = document.createElement('div');

    s.className = 'star';

    s.style.left = Math.random()*100+'%';

    s.style.top = Math.random()*100+'%';

    s.style.setProperty('--dur', (2+Math.random()*4)+'s');

    s.style.setProperty('--op', (0.2+Math.random()*0.6));

    s.style.animationDelay = Math.random()*4+'s';

    c.appendChild(s);

  }

}



// ===== Toggle Search Section =====

function toggleSearchSection() {

  const header = document.querySelector('.search-section-header');

  const content = document.getElementById('searchSectionContent');

  const isCollapsed = content.classList.toggle('collapsed');

  header.classList.toggle('collapsed', isCollapsed);

}



// ===== Calendar Functions - 苹果日历风格 =====

function renderCalendar() {

  const list = document.getElementById('calendarList');

  list.innerHTML = '';

  

  const year = currentMonth.getFullYear();

  const month = currentMonth.getMonth();

  

  document.getElementById('monthLabel').textContent = `${year}年${month + 1}月`;

  

  const firstDay = new Date(year, month, 1);

  const lastDay = new Date(year, month + 1, 0);

  const startPadding = firstDay.getDay();

  const daysInMonth = lastDay.getDate();

  

  const today = new Date();

  const totalDays = startPadding + daysInMonth;

  const totalWeeks = Math.ceil(totalDays / 7);

  

  for (let week = 0; week < totalWeeks; week++) {

    const weekRow = document.createElement('div');

    weekRow.className = 'calendar-week';

    

    for (let dayOfWeek = 0; dayOfWeek < 7; dayOfWeek++) {

      const dayIndex = week * 7 + dayOfWeek;

      let dayNum, isOtherMonth, dateObj;

      

      if (dayIndex < startPadding) {

        // 上月日期

        const prevMonth = new Date(year, month, 0);

        dayNum = prevMonth.getDate() - (startPadding - dayIndex - 1);

        isOtherMonth = true;

        dateObj = new Date(year, month - 1, dayNum);

      } else if (dayIndex >= startPadding + daysInMonth) {

        // 下月日期

        dayNum = dayIndex - (startPadding + daysInMonth) + 1;

        isOtherMonth = true;

        dateObj = new Date(year, month + 1, dayNum);

      } else {

        // 当月日期

        dayNum = dayIndex - startPadding + 1;

        isOtherMonth = false;

        dateObj = new Date(year, month, dayNum);

      }

      

      const dateKey = formatDateKey(dateObj);

      const isToday = dateObj.toDateString() === today.toDateString();

      const isSelected = selectedDate && dateObj.toDateString() === selectedDate.toDateString();

      const dayPlans = itinerary[dateKey] || [];

      const calendarEvents = CALENDAR_EVENTS[dateKey] || [];

      

      const dayEl = createDayElement(dayNum, isOtherMonth, isToday, dayPlans, isSelected, dateObj, calendarEvents);

      weekRow.appendChild(dayEl);

    }

    

    list.appendChild(weekRow);

  }

}



function createDayElement(day, isOtherMonth, isToday, plans, isSelected, dateObj, calendarEvents) {

  try {

  const div = document.createElement('div');

  div.className = 'calendar-day';

  if (isOtherMonth) div.classList.add('other-month');

  if (isToday) div.classList.add('today');

  if (isSelected) div.classList.add('selected');

  if (plans.length > 0 || (calendarEvents && calendarEvents.length > 0)) div.classList.add('has-events');

  

  // 合并并去重

  const seen = new Set();

  const allItems = [];

  // 先加行程计划

  (plans || []).forEach(p => {

    const key = (p.title).trim();

    if (!seen.has(key)) {

      seen.add(key);

      allItems.push({ text: p.title, type: 'plan', color: p.color || '', person: p.person || '' });

    }

  });

  // 再加日历清单事件

  (calendarEvents || []).forEach(e => {

    const key = (e.title || '').trim();

    if (!seen.has(key)) {

      seen.add(key);

      const { person } = extractPersonFromTitle(e.title);

      allItems.push({ text: e.title, type: 'calendar', color: '', person: person || '' });

    }

  });

  

  // 全局颜色映射：同一标题同一颜色，但同一天内颜色不重复

  if (!window._calendarColorMap) window._calendarColorMap = {};

  const PALETTE = ['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#0ea5e9','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#e11d48'];

  function getColor(name) {

    if (!(name in window._calendarColorMap)) {

      window._calendarColorMap[name] = Object.keys(window._calendarColorMap).length % PALETTE.length;

    }

    return window._calendarColorMap[name];

  }

  

  // 确保同一天内颜色不重复

  const usedColorsToday = new Set();

  allItems.forEach(item => {

    let ci = item.color ? -1 : getColor(item.text);

    if (ci >= 0 && usedColorsToday.has(ci)) {

      // 找下一个未使用的颜色

      for (let i = 0; i < PALETTE.length; i++) {

        if (!usedColorsToday.has(i)) { ci = i; break; }

      }

    }

    if (ci >= 0) usedColorsToday.add(ci);

    item._ci = ci;

  });

  

  const dateKey = formatDateKey(dateObj);

  const displayItems = allItems.slice(0, 4);

  const totalCount = allItems.length;

  

  // 底部彩色色块指示器

  let colorBarHtml = '';

  if (allItems.length > 0) {

    colorBarHtml = '<div class="day-color-bar">';

    allItems.forEach(item => {

      const dotColor = item.color || PALETTE[item._ci];

      colorBarHtml += `<span class="day-color-dot" style="background:${dotColor}"></span>`;

    });

    colorBarHtml += '</div>';

  }

  

  let eventsHtml = '';

  if (displayItems.length > 0) {

    eventsHtml = '<div class="day-events">';

    displayItems.forEach((item, idx) => {

      // 用户自定义颜色优先，否则用自动分配颜色

      const style = item.color ? `style="background:${item.color}22;color:${item.color}"` : '';

      const c = style ? '' : 'c' + item._ci;

      const doneKey = `${dateKey}_${item.text}`;

      const isDone = planDoneSet.has(doneKey);

      const dotColor = item.color || PALETTE[item._ci];

      const personTag = item.person ? ` <span style="opacity:0.5;font-size:8px">[${item.person}]</span>` : '';

      eventsHtml += `<div class="day-event ${c}${isDone ? ' done' : ''}" ${style}><span class="day-event-dot" style="background:${dotColor}"></span>${item.text}${personTag}</div>`;

    });

    if (totalCount > 4) {

      eventsHtml += `<div class="day-event more">+${totalCount - 4} 更多</div>`;

    }

    eventsHtml += '</div>';

  }

  

  div.innerHTML = `

    <span class="day-number">${day}</span>

    ${eventsHtml}

    ${colorBarHtml}

  `;

  

  div.onclick = () => selectDate(dateObj);

  div.ondblclick = () => {

    selectDate(dateObj);

    openPlanModal();

  };

  

  return div;

  } catch(e) { console.error('createDayElement error:', e); return document.createElement('div'); }

}

// 点击日历项目跳转到地图对应位置

const PERSON_NAMES = ['陈志勇', '程广超', '骈一鑫', '李彦赛', '张恩林'];



function extractPersonFromTitle(title) {

  if (!title) return { city: title, person: '' };

  for (const name of PERSON_NAMES) {

    const idx = title.lastIndexOf(name);

    if (idx >= 0) {

      const city = (title.substring(0, idx) + title.substring(idx + name.length)).trim();

      return { city: city || title, person: name };

    }

  }

  return { city: title, person: '' };

}



function flyToEvent(title) {

  // 先提取城市名再匹配

  const { city } = extractPersonFromTitle(title);

  const searchName = city || title;

  const fp = footprints.find(f => (f.name || '').includes(searchName) || (f.address || '').includes(searchName) || (f.name || '').includes(title));

  if (fp) {

    map.flyTo([fp.lat, fp.lng], 10, { duration: 0.8 });

    // 高亮对应标记

    const marker = markers[fp.id];

    if (marker) {

      const el = marker.getElement();

      if (el) {

        el.style.transform = 'scale(1.3)';

        el.style.transition = 'transform 0.3s';

        setTimeout(() => { el.style.transform = ''; }, 1500);

      }

    }

  } else {

    showToast('📍 未找到对应的地图标注', 'info');

  }

}



function renderDayDetail() {

  const dateKey = formatDateKey(selectedDate);

  const plans = itinerary[dateKey] || [];

  const calEvents = CALENDAR_EVENTS[dateKey] || [];

  const section = document.getElementById('dayDetailSection');

  const list = document.getElementById('dayDetailList');

  

  // 显示区域

  section.style.display = 'block';

  

  // 更新日期标题

  const m = selectedDate.getMonth() + 1;

  const d = selectedDate.getDate();

  const weekDay = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][selectedDate.getDay()];

  document.getElementById('selectedDateDetail').textContent = `${m}月${d}日 ${weekDay}`;

  

  if (plans.length === 0 && calEvents.length === 0) {

    list.innerHTML = '<div class="empty-plans">这一天还没有安排<br>点击「添加」开始规划 ✨</div>';

    return;

  }

  

  let html = '';

  

  // 获取颜色映射（与日历共享）

  if (!window._calendarColorMap) window._calendarColorMap = {};

  function getColor(name) {

    if (!(name in window._calendarColorMap)) {

      window._calendarColorMap[name] = Object.keys(window._calendarColorMap).length % 12;

    }

    return window._calendarColorMap[name];

  }

  const DOT_COLORS = ['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#0ea5e9','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16','#e11d48'];

  

  const seen = new Set();

  const merged = [];

  

  // 计算前后日期，查找相邻日期中的同名事件

  function getSurroundingDates(title) {

    const dates = [];

    const sel = new Date(selectedDate);

    for (let offset = -3; offset <= 3; offset++) {

      const d = new Date(sel);

      d.setDate(d.getDate() + offset);

      const dk = formatDateKey(d);

      const evts = CALENDAR_EVENTS[dk] || [];

      evts.forEach(e => {

        if ((e.title || '').trim() === title) {

          const dayNum = d.getDate();

          const m = d.getMonth() + 1;

          if (!dates.some(x => x.day === dayNum && x.month === m)) {

            dates.push({ day: dayNum, month: m, key: dk, source: e.source });

          }

        }

      });

      const p2 = itinerary[dk] || [];

      p2.forEach(p => {

        if ((p.title || '').trim() === title || (p.locationName || '').trim() === title) {

          const dayNum = d.getDate();

          const m = d.getMonth() + 1;

          if (!dates.some(x => x.day === dayNum && x.month === m)) {

            dates.push({ day: dayNum, month: m, key: dk });

          }

        }

      });

    }

    dates.sort((a, b) => a.key.localeCompare(b.key));

    return dates;

  }

  

  // 确保同一天内颜色不重复

  const seenColors = new Set();

  const seenTitles = new Set(); // 用标准化标题去重

  function normalizeTitle(t) {

    const { city, person } = extractPersonFromTitle(t || '');

    return city || (t || '').trim();

  }

  calEvents.forEach(ev => {

    const normKey = normalizeTitle(ev.title);

    if (!seenTitles.has(normKey)) {

      seenTitles.add(normKey);

      let ci = getColor(normKey);

      if (seenColors.has(ci)) {

        for (let i = 0; i < DOT_COLORS.length; i++) { if (!seenColors.has(i)) { ci = i; break; } }

      }

      seenColors.add(ci);

      const dates = getSurroundingDates(ev.title);

      merged.push({ title: ev.title, type: 'calendar', dates, _ci: ci });

    }

  });

  plans.forEach(p => {

    const normKey = normalizeTitle(p.title) || (p.locationName || '').trim();

    if (!seenTitles.has(normKey)) {

      seenTitles.add(normKey);

      let ci = getColor(normKey);

      if (seenColors.has(ci)) {

        for (let i = 0; i < DOT_COLORS.length; i++) { if (!seenColors.has(i)) { ci = i; break; } }

      }

      seenColors.add(ci);

      const dates = getSurroundingDates(p.locationName || p.title);

      merged.push({ title: p.locationName || p.title, type: 'plan', plan: p, dates, _ci: ci });

    }

  });

  

  // 按序号渲染，默认只显示前5个

  const COLLAPSE_COUNT = 5;

  const showAll = dayDetailExpanded.has(dateKey);

  const visibleItems = showAll ? merged : merged.slice(0, COLLAPSE_COUNT);

  const hiddenCount = merged.length - COLLAPSE_COUNT;

  

  visibleItems.forEach((item, idx) => {

    const colorIdx = item._ci !== undefined ? item._ci : getColor(item.title);

    const dotColor = item.plan?.color || DOT_COLORS[colorIdx];

    const doneKey = `${dateKey}_${item.title}`;

    const isDone = planDoneSet.has(doneKey);

    

    // 构建日期标签：如果有多个相邻日期，显示为一行小标签

    let datesHtml = '';

    if (item.dates && item.dates.length > 1) {

      datesHtml = '<div class="plan-dates">';

      item.dates.forEach(d => {

        const isCurrent = d.key === dateKey;

        const prefix = (d.month !== (selectedDate.getMonth() + 1)) ? `${d.month}/` : '';

        datesHtml += `<span class="plan-date-tag ${isCurrent ? 'current' : ''}">${prefix}${d.day}</span>`;

      });

      datesHtml += '</div>';

    }

    

    if (item.type === 'calendar') {

      const { person: extractedPerson } = extractPersonFromTitle(item.title);

      const personTag = extractedPerson ? `<span class="plan-person-tag">${extractedPerson}</span>` : '';

      html += `

      <div class="plan-item calendar-sync-item ${isDone ? 'done' : ''}" onclick="flyToEvent('${item.title.replace(/'/g, "\\'")}')" ondblclick="editCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')">

        <div class="done-toggle" onclick="event.stopPropagation(); togglePlanDone('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="${isDone ? '取消完成' : '标记完成'}">${isDone ? '✓' : ''}</div>

        <span class="plan-time"><span class="plan-dot" style="background:${dotColor}"></span></span>

        <div class="plan-content">

          <div class="plan-title">${item.title} ${personTag}</div>

          ${datesHtml}

        </div>

        <div class="plan-actions">

          <button class="plan-edit-btn" onclick="event.stopPropagation(); editCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="编辑">✎</button>

          <button class="plan-delete" onclick="event.stopPropagation(); removeCalendarEvent('${dateKey}', '${item.title.replace(/'/g, "\\'")}')" title="删除">✕</button>

        </div>

      </div>`;

    } else {

      const plan = item.plan;

      const planIdx = plans.indexOf(plan);

      // 负责人：优先用行程自带的 person，没有则从关联足迹查找，都没有则从标题智能提取

      let planPerson = item.plan?.person || '';

      if (!planPerson && plan.locationId) {

        const fp = footprints.find(f => f.id === plan.locationId);

        if (fp?.person) planPerson = fp.person;

      }

      if (!planPerson) {

        const { person: extracted } = extractPersonFromTitle(item.title);

        planPerson = extracted || '';

      }

      const personTag = planPerson ? `<span class="plan-person-tag">${planPerson}</span>` : '';

      html += `

      <div class="plan-item ${isDone ? 'done' : ''}" ${item.planColor ? `style="border-left: 3px solid ${item.planColor}"` : ''} onclick="flyToEvent('${item.title.replace(/'/g, "\\'")}')" ondblclick="editPlanItem('${dateKey}', ${planIdx})">

        <div class="done-toggle" onclick="event.stopPropagation(); togglePlanDone('${dateKey}', '${(plan.title || '').replace(/'/g, "\\'")}')" title="${isDone ? '取消完成' : '标记完成'}">${isDone ? '✓' : ''}</div>

        <span class="plan-time"><span class="plan-dot" style="background:${dotColor}"></span></span>

        <div class="plan-content">

          <div class="plan-title">${item.title} ${personTag}</div>

          ${datesHtml}

        </div>

        <div class="plan-actions">

          <button class="plan-edit-btn" onclick="event.stopPropagation(); editPlanItem('${dateKey}', ${planIdx})" title="编辑">✎</button>

          <button class="plan-delete" onclick="event.stopPropagation(); deletePlan('${dateKey}', ${planIdx})" title="删除">✕</button>

        </div>

      </div>`;

    }

  });

  

  // 折叠/展开按钮

  if (hiddenCount > 0 && !showAll) {

    html += `<div class="plan-expand-btn" onclick="toggleDayDetailExpand()">展开剩余 ${hiddenCount} 项 ▾</div>`;

  } else if (showAll && merged.length > COLLAPSE_COUNT) {

    html += `<div class="plan-expand-btn" onclick="toggleDayDetailExpand()">收起 ▴</div>`;

  }

  

  list.innerHTML = html;

}

function formatDateKey(date) {

  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

}

function saveEditFootprint() {

  const name = document.getElementById('editFpNameInput').value.trim();

  const address = document.getElementById('editFpAddressInput').value.trim();

  const timeStr = document.getElementById('editFpTimeInput').value.trim();

  const unlockedValue = document.getElementById('editFpUnlockedInput').value;

  const type = document.getElementById('editFpTypeInput').value;

  const person = document.getElementById('editFpPersonInput').value;

  

  if (!name) {

    showToast('❌ 请输入地点名称', 'error');

    return;

  }

  

  if (!editingFootprintId) {

    showToast('❌ 编辑信息丢失', 'error');

    return;

  }

  

  const fpIndex = footprints.findIndex(f => f.id === editingFootprintId);

  if (fpIndex === -1) {

    showToast('❌ 足迹不存在', 'error');

    return;

  }

  

  // 解锁百分比

  const unlocked = unlockedValue ? parseFloat(unlockedValue) : null;

  

  // 更新足迹数据

  footprints[fpIndex].name = name;

  footprints[fpIndex].address = address || `${footprints[fpIndex].lng.toFixed(4)}, ${footprints[fpIndex].lat.toFixed(4)}`;

  footprints[fpIndex].time = timeStr || new Date().toLocaleString('zh-CN');

  footprints[fpIndex].unlocked = unlocked;

  footprints[fpIndex].person = person;

  

  // 如果类型变了，需要重新渲染

  const oldType = footprints[fpIndex].type;

  footprints[fpIndex].type = type;

  

  save();

  renderFootprints();

  updateStats();

  

  // 重新创建标记（可能负责人变了需要更新显示）

  renderAllMarkers();

  

  closeEditFootprintModal();

  showToast('✅ 已保存修改', 'success');

}



function savePlan() {

  const title = document.getElementById('planTitle').value.trim();

  const color = selectedPlanColor;

  const person = document.getElementById('planPerson').value;

  

  if (!title) {

    showToast('请输入行程内容', 'error');

    return;

  }

  

  if (editingCalendarOldTitle) {

    // 编辑日历清单事件

    const dateKey = editingPlanKey;

    if (CALENDAR_EVENTS[dateKey]) {

      const ev = CALENDAR_EVENTS[dateKey].find(e => e.title === editingCalendarOldTitle);

      if (ev) ev.title = title;

    }

    editingCalendarOldTitle = null;

    renderCalendar();

    renderDayDetail();

    closePlanModal();

    showToast('✅ 事件已更新', 'success');

  } else if (editingPlanKey && editingPlanIdx !== null) {

    // 编辑模式：更新现有行程

    const dateKey = editingPlanKey;

    const planIdx = editingPlanIdx;

    const old = itinerary[dateKey][planIdx];

    itinerary[dateKey][planIdx] = { title, color: color || old.color || '', person: person || old.person || '', locationId: old.locationId || '', locationName: old.locationName || '' };

    localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));

    triggerAutoSync();

    renderCalendar();

    renderDayDetail();

    closePlanModal();

    showToast('✅ 行程已更新', 'success');

  } else {

    // 添加模式

    const dateKey = formatDateKey(selectedDate);

    if (!itinerary[dateKey]) itinerary[dateKey] = [];

    itinerary[dateKey].push({ title, color, person, locationId: '', locationName: '' });

    localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));

    triggerAutoSync();

    renderCalendar();

    renderDayDetail();

    closePlanModal();

    showToast('✅ 行程添加成功', 'success');

  }

}



function deletePlan(dateKey, idx) {

  const item = itinerary[dateKey]?.[idx];

  // 如果删除的是项目安排同步来的事件，同步删除项目安排中的对应条目
  if (item && item.source === 'schedule') {

    const title = (item.title || '').trim();

    const delIdx = scheduleItems.findIndex(s => (s.content || '').trim() === title && s.date === dateKey);

    if (delIdx >= 0) {

      scheduleItems.splice(delIdx, 1);

      localStorage.setItem(SCHEDULE_KEY, JSON.stringify(scheduleItems));

      renderProjectSchedule();

    }

  }



  itinerary[dateKey].splice(idx, 1);

  if (itinerary[dateKey].length === 0) delete itinerary[dateKey];

  localStorage.setItem(ITINERARY_KEY, JSON.stringify(itinerary));

  triggerAutoSync();

  renderCalendar();

  renderDayDetail();

  updateItineraryStats();

  drawRouteLine();

  showToast('🗑️ 行程已删除', 'error');

}



function removeCalendarEvent(dateKey, title) {

    if (CALENDAR_EVENTS[dateKey].length === 0) delete CALENDAR_EVENTS[dateKey];

}

function updateItineraryStats() {

  const allPlans = Object.values(itinerary).flat();

  const uniqueDates = Object.keys(itinerary).length;

  const uniqueCities = new Set(allPlans.filter(p => p.locationId).map(p => {

    const fp = footprints.find(f => f.id === p.locationId);

    return fp ? fp.name : null;

  }).filter(Boolean)).size;

  

  const el1 = document.getElementById('planDays'); if(el1) el1.textContent = uniqueDates;
  const el2 = document.getElementById('planCities'); if(el2) el2.textContent = uniqueCities;

function renderDestinations() {

  const container = document.getElementById('destinationsList');

  const allPlans = Object.values(itinerary).flat();

  const uniqueLocations = [...new Set(allPlans.filter(p => p.locationId).map(p => p.locationId))];

  

  const el4 = document.getElementById('destCount'); if(el4) el4.textContent = uniqueLocations.length;

    return;

  container.innerHTML = '';

  uniqueLocations.forEach(id => {

    if (!fp) return;

    

    const tag = document.createElement('div');

    tag.className = 'destination-tag';

    const typeIcons = { visited: '✓', upcoming: '●', project: '●' };

    tag.innerHTML = `<span class="type-icon">${typeIcons[fp.type] || '📍'}</span>${fp.name}`;

    tag.onclick = () => {

      map.setView([fp.lat, fp.lng], 14);

      if (markers[fp.id]) markers[fp.id].openPopup();

    };

    container.appendChild(tag);

  });

}



// ===== Route Line =====

function drawRouteLine() {

  if (routeLine) {

    map.removeLayer(routeLine);

    routeLine = null;

  }

  

  const sortedDates = Object.keys(itinerary).sort();

  const path = [];

  

  sortedDates.forEach(dateKey => {

    itinerary[dateKey].forEach(plan => {

      if (plan.locationId) {

        const fp = footprints.find(f => f.id === plan.locationId);

        if (fp) path.push([fp.lat, fp.lng]);

      }

    });

  });

  

  if (path.length < 2) return;

  

  routeLine = L.polyline(path, {

    color: '#00ff88',

    weight: 3,

    dashArray: '10, 5',

    lineJoin: 'round',

    lineCap: 'round'

  }).addTo(map);

}

function doSearch() {

  const keyword = document.getElementById('searchInput').value.trim();

  if (!keyword) return;

  

  const mode = currentMode;

  const container = document.getElementById('searchResults');

  container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">搜索中...</div>';

  container.classList.add('show');



  // 使用本地数据搜索

  const lowerKeyword = keyword.toLowerCase();

  const results = CHINA_LOCATIONS.filter(loc => 

    loc.name.toLowerCase().includes(lowerKeyword) || 

    loc.address.toLowerCase().includes(lowerKeyword)

  ).slice(0, 10);

  

  container.innerHTML = '';

  

  if (results.length > 0) {

    renderSearchResults(results, mode);

  } else {

    container.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px;">未找到相关地点 😢<br><span style="font-size:11px;opacity:0.7;">试试搜索：北京、上海、杭州、成都...</span></div>';

  }

}



function renderSearchResults(results, mode) {

  const container = document.getElementById('searchResults');

  results.forEach((result) => {

    const isAdded = footprints.some(f => f.name === result.name && Math.abs(f.lng - result.lon) < 0.001 && f.type === mode);

    const item = document.createElement('div');

    item.className = 'search-result-item';

    const iconEmojis = { visited: '📍', upcoming: '●', project: '●' };

    item.innerHTML = `

      <div class="result-icon">${iconEmojis[mode]}</div>

      <div class="result-info">

        <div class="result-name">${result.name}</div>

        <div class="result-addr">${result.address}</div>

      </div>

      <button class="result-add-btn ${isAdded ? 'added' : ''}">

        ${isAdded ? '✓ 已添加' : '+ 添加'}

      </button>

    `;

    item.addEventListener('click', (e) => {

      if (e.target.classList.contains('result-add-btn')) return;

      map.setView([result.lat, result.lon], 14);

    });

    const addBtn = item.querySelector('.result-add-btn');

    addBtn.addEventListener('click', (e) => {

      e.stopPropagation();

      if (isAdded) return;

      addFootprint(result.name, result.address, [result.lon, result.lat], mode);

      addBtn.textContent = '✓ 已添加';

      addBtn.classList.add('added');

    });

    container.appendChild(item);

  });

}

// ===== CRUD =====

function addFootprint(name, address, lnglat, type, visitDate = null, unlockedPercent = null) {

  const fp = addFootprintWithReturn(name, address, lnglat, type, visitDate, unlockedPercent);

  if (fp) {

    const toastMsgs = {

      visited: `✅ 已标记「${name}」为已去过`,

      upcoming: `已将「${name}」标记为CGC项目`,

      project: `已将「${name}」标记为近期项目`

    };

    showToast(toastMsgs[type], type === 'visited' ? 'success' : type);

  }

}



function addFootprintWithReturn(name, address, lnglat, type, visitDate = null, unlockedPercent = null) {

  const fp = {

    id: Date.now() + Math.random().toString(36).slice(2),

    name, address, type,

    lng: lnglat[0], lat: lnglat[1],

    time: visitDate || new Date().toLocaleString('zh-CN'),

    unlocked: unlockedPercent

  };

  footprints.push(fp);

  save();

  renderFootprints();

  updateStats();

  addMarker(fp);

  return fp;

}

function loadUserFootprints() {

  if (typeof USER_FOOTPRINTS_RAW !== 'undefined') {

    });

  }
